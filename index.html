<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Range Poker - Heads Up NLHE</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at 50% 35%, #224430 0%, #163020 55%, #0a1a0c 100%);
  color: #e0e0e0;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
}

/* ===== SETUP SCREEN ===== */
#setup-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 18px;
}
#setup-screen h1 {
  font-size: 2.4em;
  color: #f0c040;
  text-shadow: 0 0 20px rgba(240,192,64,0.4);
}
.setup-card {
  background: #132814;
  border: 1px solid #0f3a1a;
  border-radius: 12px;
  padding: 28px 36px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.setup-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.setup-row label { color: #aaa; }
.setup-row.setup-toggle { justify-content: flex-start; gap: 10px; cursor: pointer; }
.setup-row.setup-toggle label { cursor: pointer; }
.setup-row.setup-toggle input[type=checkbox] { width: 16px; height: 16px; accent-color: #f0c040; cursor: pointer; }
.setup-row input {
  background: #0f3a1a;
  border: 1px solid #1a5c2e;
  border-radius: 6px;
  color: #fff;
  padding: 5px 10px;
  width: 110px;
  font-size: 0.95em;
  text-align: center;
}
.btn-start {
  background: linear-gradient(135deg, #f0c040, #e67e22);
  color: #111;
  border: none;
  border-radius: 8px;
  padding: 11px 24px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.btn-start:hover { filter: brightness(1.1); }
#btn-cancel-room { background:#3a1a1a; border:1px solid #7a3a3a; color:#e88; border-radius:6px; padding:6px 18px; font-size:0.85em; cursor:pointer; }
#btn-cancel-room:hover { filter:brightness(1.2); }

/* ===== GAME SCREEN ===== */
#game-screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding: 6px;
  gap: 6px;
  background: radial-gradient(ellipse at 50% 45%, rgba(10,60,20,0.5) 0%, transparent 60%);
}

/* Top bar */
#top-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: #555;
  margin-bottom: 2px;
}
.btn-small {
  background: #1c1c1c;
  border: 1px solid #333;
  color: #aaa;
  border-radius: 5px;
  padding: 3px 9px;
  cursor: pointer;
  font-size: 1.58em;
  white-space: nowrap;
}
.btn-small:hover { background: #2a2a2a; }

/* Message banner */
#msg-banner {
  background: #0d1a0d;
  border: 1px solid #1a3a22;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 0.82em;
  color: #7fc494;
  text-align: center;
  min-height: 26px;
}

/* Main 3-column layout */
#main-area {
  display: grid;
  grid-template-columns: auto auto 200px auto auto;
  justify-content: space-evenly;
  row-gap: 8px;
  column-gap: 0px;
  align-items: start;
  padding: 0;
}

/* Player panel */
.player-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding-top: 4px;
}
.player-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.58em;
  font-weight: 700;
  color: #ddd;
}
.dealer-btn {
  background: #f0c040;
  color: #111;
  border-radius: 50%;
  width: 34px; height: 34px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 1em;
  font-weight: 800;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}
.dealer-btn.show { display: inline-flex; }
.player-info-wrap { position: relative; }
#dbtn0 { left: calc(100% + 10px); }
#dbtn1 { right: calc(100% + 10px); }
.pos-badge {
  background: #0f3a1a;
  color: #7fc494;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 1em;
}

/* Timer */
.timer-row {
  display: flex;
  align-items: center;
  visibility: hidden;
  position: relative;
}
.timer-row.active { visibility: visible; }
.timer-text { font-size: 0.78em; color: #f39c12; width: 28px; position: absolute; left: -34px; top: 50%; transform: translateY(-50%); text-align: right; }
.timer-bar { width: calc(13 * 37px + 16px); height: 10px; background: linear-gradient(90deg, #e74c3c, #f39c12, #27ae60); border-radius: 3px; overflow: hidden; position: relative; flex-shrink: 0; }
.timer-fill { position: absolute; top: 0; right: 0; bottom: 0; width: 0%; background: #0f3a1a; }

/* Hand chart */
.hand-chart {
  display: grid;
  grid-template-columns: repeat(13, 37px);
  grid-template-rows: repeat(13, 47px);
  gap: 1px;
  background: #0a0f0a;
  border: 1px solid #0f3a1a;
  border-radius: 3px;
  padding: 1px;
  cursor: crosshair;
  user-select: none;
  margin-top: 10px;
}
.hc {
  width: 37px; height: 47px;
  display: flex;
  flex-direction: column;
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  cursor: crosshair;
}
.hc-label {
  height: 12px;
  flex-shrink: 0;
  background: #0a150a;
  color: #777;
  font-size: 7.5px;
  font-weight: 700;
  text-align: center;
  line-height: 11px;
  pointer-events: none;
}
.hc-suits { flex: 1; display: grid; min-height: 0; }
.hcs-suited  { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.hcs-offsuit { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; }
.hcs-pair    { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
.hc-suit { background: #0a0f0a; }
.hc.drag-sel { outline: 2px solid rgba(255,255,255,0.85); outline-offset: -1px; z-index: 3; }

/* Suit filter panel */
#suit-filter { border-top: 1px solid #1a3a22; margin-top: 3px; padding-top: 3px; }
.sf-toggle { background:none; border:none; color:#7fc494; font-size:0.73em; cursor:pointer; width:100%; text-align:left; padding:2px 0; }
.sf-toggle:hover { color:#bbb; }
#hand-types { border-top: 1px solid #1a3a22; margin-top: 3px; padding-top: 3px; }
#ht-toggle-btn { background:none; border:none; color:#7fc494; font-size:0.73em; cursor:pointer; width:100%; text-align:left; padding:2px 0; }
#ht-toggle-btn:hover { color:#bbb; }
#randomize-section { border-top: 1px solid #1a3a22; margin-top: 3px; padding-top: 3px; }
#rz-toggle-btn { background:none; border:none; color:#7fc494; font-size:0.73em; cursor:pointer; width:100%; text-align:left; padding:2px 0; }
#rz-toggle-btn:hover { color:#bbb; }
#rz-body { margin-top:4px; display:flex; flex-direction:column; gap:3px; }
.rz-row { display:flex; align-items:center; gap:6px; }
.rz-lbl { font-size:0.68em; color:#9ab; width:46px; flex-shrink:0; }
.rz-inp { width:52px; background:#0f2a1a; border:1px solid #2a5a3a; color:#ddd; font-size:0.72em; padding:2px 4px; border-radius:3px; text-align:right; }
.rz-inp:disabled { opacity:0.4; cursor:not-allowed; }
.rz-go-btn { background:#2a5a2a; border:1px solid #4a9a4a; color:#cfc; font-size:0.72em; border-radius:3px; padding:3px 10px; cursor:pointer; width:100%; }
.rz-go-btn:hover { filter:brightness(1.3); }
#ht-body { margin-top:4px; display:flex; flex-wrap:wrap; gap:3px; }
.ht-btn { background:#0f2a1a; border:1px solid #1a4a2a; color:#9cc; font-size:0.63em; border-radius:3px; padding:2px 5px; cursor:pointer; white-space:nowrap; }
.ht-btn:hover { background:#1a3a20; color:#eff; }
#sf-body { margin-top:4px; display:flex; flex-direction:column; gap:5px; }
.sf-section { display:flex; flex-direction:column; gap:2px; }
.sf-sec-hdr { display:flex; align-items:center; justify-content:space-between; font-size:0.65em; color:#555; }
.sf-sec-hdr button { background:#1a3a22; border:1px solid #2a5a3a; color:#9ab; font-size:0.8em; cursor:pointer; padding:1px 5px; border-radius:2px; }
.sf-sec-hdr button:hover { filter:brightness(1.3); }
.sf-global-row { display:flex; gap:5px; justify-content:center; margin-bottom:5px; }
.sf-global-btn { background:#1a3a22; border:1px solid #2a5a3a; color:#9ab; font-size:0.7em; cursor:pointer; padding:2px 10px; border-radius:3px; }
.sf-global-btn:hover { filter:brightness(1.3); }
.sf-grid { display:grid; gap:2px; }
.sf-btn { background:#0f3a1a; border:1px solid #1a5c2e; border-radius:2px; font-size:0.68em; padding:2px 1px; cursor:pointer; text-align:center; line-height:1.2; }
.sf-btn.off { background:#0a0f0a; border-color:#111; opacity:0.35; }
.sf-btn:hover { filter:brightness(1.3); }
.sf-suit-row { display:flex; gap:2px; justify-content:center; margin-bottom:1px; }
.sf-suit-add-btn { background:#1a3a22; border:1px solid #2a5a3a; border-radius:2px; font-size:0.85em; padding:1px 7px; cursor:pointer; line-height:1.3; }
.sf-suit-add-btn:hover { filter:brightness(1.4); }

/* Range summary */
.range-sum {
  font-size: 1.28em;
  color: #fff;
  text-align: center;
  min-height: 13px;
}

/* Hole cards */
.hole-cards {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.card {
  width: 60px; height: 86px;
  background: #fff;
  border-radius: 5px;
  border: 1px solid #ccc;
  position: relative;
  box-shadow: 0 3px 8px rgba(0,0,0,0.7), 0 1px 2px rgba(0,0,0,0.4);
  flex-shrink: 0;
  overflow: hidden;
}
.card.red { color: #c0392b; }
.card.black { color: #111; }
.card.down {
  background: linear-gradient(145deg, #8b1414, #5c0a0a);
  border: 2px solid #c9a227;
}
.card.down::before {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid rgba(201,162,39,0.35);
  border-radius: 2px;
  background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(201,162,39,0.05) 3px, rgba(201,162,39,0.05) 4px),
              repeating-linear-gradient(-45deg, transparent, transparent 3px, rgba(201,162,39,0.05) 3px, rgba(201,162,39,0.05) 4px);
}
.card-corner {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.1;
}
.card-tl { top: 3px; left: 3px; }
.card-br { bottom: 3px; right: 3px; transform: rotate(180deg); }
.card-rank { font-size: 15px; font-weight: 900; color: inherit; }
.card-suit-sm { font-size: 12px; color: inherit; }
.card-ctr {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  color: inherit;
}

.bet-disp { font-size: 1.65em; font-weight: 700; color: #f0c040; position: absolute; top: 50%; transform: translateY(-50%); white-space: nowrap; }
#bdisp0 { left: calc(100% + 8px); }
#bdisp1 { right: calc(100% + 8px); }
.player-info-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  border: 1px solid #2a4a30;
  border-radius: 6px;
  background: #0d1a10;
  padding: 6px 20px;
}
.stack-disp { font-size: 1.58em; font-weight: 600; color: #f0c040; text-align: center; min-height: 14px; }
.hole-area { position: relative; display: inline-block; margin-top: 6px; }
.waiting { display: none; }

/* Center column */
#center-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding-top: 2px;
}
#action-panel {
  margin-top: 14px;
}
#board-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin-top: 0;
}
#pot-disp {
  font-size: 1.95em;
  font-weight: 700;
  color: #f0c040;
}
#community-cards {
  display: flex;
  gap: 4px;
}
.cc-slot {
  width: 60px; height: 86px;
  border: 1px dashed #1a3a22;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.cc-slot .card { width: 58px; height: 84px; font-size: 0.95em; border: none; box-shadow: none; }

/* Action panel */
#action-panel {
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  width: 100%;
}
#action-panel.hidden { display: none; }
#waiting-bars {
  display: none;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 6px 8px;
  flex-direction: column;
  gap: 5px;
  width: 100%;
  margin-top: 14px;
}
#waiting-bars.visible { display: flex; }
#action-prompt { font-size: 0.78em; color: #888; text-align: center; }

.action-btns {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}
.aBtn {
  border: none;
  border-radius: 5px;
  padding: 6px 12px;
  font-size: 0.8em;
  font-weight: 700;
  cursor: pointer;
}
.aBtn:hover { filter: brightness(1.15); }
.aBtn-check, .aBtn-call { background: #1e8449; color: #fff; }
.aBtn-bet, .aBtn-raise { background: #922b21; color: #fff; }
.aBtn-fold { background: #2d5070; color: #fff; }

#sel-mode-row { display: flex; justify-content: center; gap: 0; }
.sel-mode-btn {
  background: #1c1c1c;
  border: 1px solid #333;
  color: #666;
  padding: 3px 10px;
  font-size: 0.72em;
  cursor: pointer;
}
.sel-mode-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.sel-mode-btn:last-child  { border-radius: 0 4px 4px 0; }
.sel-mode-btn.active { background: #3a3a3a; color: #ccc; }
#sel-all-btn { border-left: none; box-sizing: border-box; width: 60px; height: 43px; flex-shrink: 0; }

#range-dist { font-size: 0.72em; color: #aaa; text-align: center; line-height: 1.4; }
#range-dist-bar { display: flex; height: 10px; border-radius: 0; overflow: hidden; margin-top: 2px; }
#range-dist-bar span { display: block; transition: width 0.15s; }
#bar-toggle-row { display: flex; justify-content: center; margin-bottom: 2px; }
.bar-toggle-btn { background: #1c1c1c; border: 1px solid #333; color: #666; padding: 2px 10px; font-size: 0.68em; cursor: pointer; }
.bar-toggle-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.bar-toggle-btn:last-child { border-radius: 0 4px 4px 0; }
.bar-toggle-btn.active { background: #3a3a3a; color: #ccc; }
#strength-bar-wrap { display: none; }
#strength-bar-wrap.visible { display: flex; flex-direction: column; gap: 2px; }
.strength-bar { height: 10px; border-radius: 0; overflow: hidden; display: flex; align-items: stretch; background: #111; cursor: pointer; }
#strength-popup { display: none; position: fixed; background: #1e1e1e; border: 1px solid #444; border-radius: 6px; padding: 10px; z-index: 1000; flex-direction: column; gap: 6px; width: 70vw; max-width: 900px; min-width: 400px; cursor: default; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
#strength-popup.visible { display: flex; }
#strength-popup .strength-bar { height: 120px; cursor: default; }

.range-slots { display: flex; flex-direction: column; gap: 4px; width: 102px; flex-shrink: 0; padding-top: 181px; }
.rs-hdr { font-size: 0.78em; color: #fff; text-align: center; line-height: 1.3; margin-bottom: 1px; letter-spacing: 0.02em; }
.rs-slot { display: flex; flex-direction: column; align-items: stretch; gap: 3px; padding: 4px 4px 6px; background: #1e150a; border: 1px solid #3a2810; border-radius: 4px; }
.rs-name { font-size: 0.78em; color: #8a7055; text-align: center; cursor: text; outline: none; padding: 1px 3px; border-radius: 2px; word-break: break-word; min-height: 1.1em; }
.rs-name:focus { background: #2e1e0a; color: #ddd; }
.rs-btn { font-size: 0.78em; padding: 3px 0; border: none; border-radius: 3px; cursor: pointer; color: #ccc; background: #2e1e0a; width: 100%; }
.rs-btn:hover { filter: brightness(1.3); }
.rs-btn.rs-save { background: #145a32; }
.rs-btn.rs-load { background: #3a1f4a; color: #9a7aaa; }
.rs-btn.rs-load.has-data { background: #7d3c98; color: #fff; }
.range-slots.pf-disabled { opacity: 0.3; pointer-events: none; }
.range-slots.opp-view { opacity: 0.75; }
.range-slots.opp-view .rs-save { opacity: 0.3; pointer-events: none; }
.range-slots.opp-view .rs-name { pointer-events: none; }
.rs-io { display: flex; gap: 3px; margin-top: 2px; }
.rs-io-btn { flex: 1; font-size: 0.75em; padding: 3px 0; border: none; border-radius: 3px; cursor: pointer; color: #bbb; background: #252525; }
.rs-io-btn:hover { filter: brightness(1.4); }
.rs-import-area { display: none; flex-direction: column; gap: 3px; margin-top: 3px; }
.rs-import-area.open { display: flex; }
.rs-import-ta { width: 100%; height: 58px; background: #111; color: #ccc; border: 1px solid #444; border-radius: 3px; font-size: 0.65em; padding: 3px; box-sizing: border-box; resize: vertical; font-family: monospace; }
.rs-import-apply { font-size: 0.75em; padding: 3px 0; border: none; border-radius: 3px; cursor: pointer; color: #fff; background: #1a5276; width: 100%; }
.rs-import-apply:hover { filter: brightness(1.3); }
.rs-import-msg { font-size: 0.7em; text-align: center; min-height: 1em; }

.bet-row {
  display: none;
  align-items: center;
  gap: 5px;
  font-size: 0.8em;
  color: #888;
  justify-content: center;
}
.bet-row input {
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 4px;
  color: #fff;
  padding: 3px 7px;
  width: 64px;
  font-size: 0.88em;
  text-align: center;
}
.presets {
  display: none;
  flex-wrap: wrap;
  gap: 3px;
  justify-content: center;
}
.preset {
  background: #1c1c1c;
  border: 1px solid #333;
  color: #999;
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 0.72em;
  cursor: pointer;
}
.preset:hover { background: #2a2a2a; }
.preset:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

.submit-row {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.btn-submit {
  background: linear-gradient(135deg, #f0c040, #e67e22);
  color: #111;
  border: none;
  border-radius: 5px;
  padding: 6px 18px;
  font-size: 0.85em;
  font-weight: 700;
  cursor: pointer;
}
.btn-submit:hover { filter: brightness(1.1); }
.btn-draft {
  background: #1c1c1c;
  border: 1px solid #333;
  color: #999;
  border-radius: 5px;
  padding: 6px 10px;
  font-size: 0.78em;
  cursor: pointer;
}
.btn-draft:hover { background: #2a2a2a; }
.btn-fold-early {
  background: #2a0a0a;
  border: 1px solid #7a2020;
  color: #e07070;
  border-radius: 5px;
  padding: 5px 14px;
  font-size: 0.78em;
  cursor: pointer;
}
.btn-fold-early:hover { background: #3a1010; }
.btn-undo {
  background: #1c1c1c;
  border: 1px solid #333;
  color: #999;
  border-radius: 5px;
  padding: 5px 14px;
  font-size: 0.78em;
  cursor: pointer;
}
.btn-undo:hover { background: #2a2a2a; }
.btn-undo:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

/* Log */
#log {
  background: #0a0f0a;
  border: 1px solid #1a2a1a;
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 0.72em;
  color: #555;
  max-height: 70px;
  overflow-y: auto;
  width: 100%;
}
.log-line { margin-bottom: 2px; }
.log-line.log-info  { color: #555; }
.log-line.log-fold  { color: #5b8fd4; }
.log-line.log-check { color: #4db87a; }
.log-line.log-call  { color: #4db87a; }
.log-line.log-bet   { color: #e07030; }
.log-line.log-raise { color: #e04545; }
.log-line.log-result { color: #f0c040; font-weight: 700; }

#next-btn {
  display: none;
  background: linear-gradient(135deg, #1e8449, #145a32);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 22px;
  font-size: 0.9em;
  font-weight: 700;
  cursor: pointer;
}

      var rk = ht[0];
      for (var i=0;i<4;i++) for (var j=i+1;j<4;j++)
        combos.push(rk+SUITS[i]+rk+SUITS[j]);
    } else {
      var r1=ht[0], r2=ht[1], suited=ht[2]==='s';
      if (suited) {
        for (var s of SUITS) combos.push(r1+s+r2+s);
      } else {
        for (var s1 of SUITS) for (var s2 of SUITS)
          if (s1!==s2) combos.push(r1+s1+r2+s2);
      }
    }
    return combos;
  }

  function cKey(c1,c2) {
    // Canonical combo key: sort by rank-idx then suit
    var k1=RANKS.indexOf(cRank(c1))*4+SUITS.indexOf(cSuit(c1));
    var k2=RANKS.indexOf(cRank(c2))*4+SUITS.indexOf(cSuit(c2));
    return k1<=k2 ? c1+c2 : c2+c1;
  }

  // ---- Hand Evaluator ----
  function evalHand(cards) {
    if (cards.length===5) return eval5(cards);
    var best=null;
    var n=cards.length; // 6 (turn) or 7 (river) — pick best 5
    var skip = n===7 ? 2 : 1;
    function iter(start, excluded) {
      if (excluded.length===skip) {
        var five=cards.filter((_,k)=>!excluded.includes(k));
        var v=eval5(five);
        if (!best||v.rank>best.rank) best=v;
        return;
      }
      for (var i=start;i<n;i++) { excluded.push(i); iter(i+1,excluded); excluded.pop(); }
    }
    iter(0,[]);
    return best;
  }

  function eval5(cards) {
    var rv=cards.map(c=>RVAL[cRank(c)]).sort((a,b)=>b-a);
    var sv=cards.map(c=>cSuit(c));
    var flush=sv.every(s=>s===sv[0]);

    // Straight detection
    var uniq=[...new Set(rv)].sort((a,b)=>b-a);
    var str=false, strHi=0;
    for (var i=0;i<=uniq.length-5;i++) {
      if (uniq[i]-uniq[i+4]===4 && uniq.slice(i,i+5).length===5) {
        str=true; strHi=uniq[i]; break;
      }
    }
    // Wheel A2345
    if (!str&&uniq.includes(14)&&uniq.includes(2)&&uniq.includes(3)&&uniq.includes(4)&&uniq.includes(5)) {
      str=true; strHi=5;
    }

    // Count groups
    var cnt={};
    rv.forEach(r=>cnt[r]=(cnt[r]||0)+1);
    var grp=Object.entries(cnt).map(([r,c])=>({r:+r,c})).sort((a,b)=>b.c-a.c||b.r-a.r);

    if (str&&flush) {
      return {rank:8e8+strHi, desc: strHi===14?'Royal Flush':'Straight Flush, '+rname(strHi)+' high'};
    }
    if (grp[0].c===4) {
      return {rank:7e8+grp[0].r*100+grp[1].r, desc:'Four of a Kind, '+pluralRank(grp[0].r)};
    }
    if (grp[0].c===3&&grp[1]&&grp[1].c>=2) {
      return {rank:6e8+grp[0].r*100+grp[1].r, desc:'Full House, '+pluralRank(grp[0].r)+' full of '+pluralRank(grp[1].r)};
    }
    if (flush) {
      var v=rv.reduce((a,r,i)=>a+r*Math.pow(15,4-i),0);
      return {rank:5e8+v, desc:'Flush, '+rname(rv[0])+' high'};
    }
    if (str) {
      return {rank:4e8+strHi, desc:'Straight, '+rname(strHi)+' high'};
    }
    if (grp[0].c===3) {
      var ks=grp.slice(1).map(g=>g.r);
      return {rank:3e8+grp[0].r*1e4+ks[0]*100+(ks[1]||0), desc:'Three of a Kind, '+pluralRank(grp[0].r)};
    }
    if (grp[0].c===2&&grp[1]&&grp[1].c===2) {
      var k3=grp[2]?grp[2].r:0;
      return {rank:2e8+grp[0].r*1e4+grp[1].r*100+k3, desc:'Two Pair, '+pluralRank(grp[0].r)+' and '+pluralRank(grp[1].r)};
    }
    if (grp[0].c===2) {
      var ks2=grp.slice(1).map(g=>g.r);
      return {rank:1e8+grp[0].r*1e6+ks2[0]*1e4+(ks2[1]||0)*100+(ks2[2]||0), desc:'Pair of '+pluralRank(grp[0].r)};
    }
    var hv=rv.reduce((a,r,i)=>a+r*Math.pow(15,4-i),0);
    return {rank:hv, desc:'High Card '+rname(rv[0])};
  }

  function rname(v) {
    return {14:'Ace',13:'King',12:'Queen',11:'Jack',10:'Ten',9:'Nine',8:'Eight',
            7:'Seven',6:'Six',5:'Five',4:'Four',3:'Three',2:'Two'}[v]||v;
  }
  function pluralRank(v) {
    // e.g. "Sixes" not "Sixs"
    var n=rname(v);
    if (n==='Six') return 'Sixes';
    if (n==='Two') return 'Twos';
    if (n==='Ace'||n==='Nine'||n==='Five'||n==='Three') return n+'s';
    return n+'s';
  }

  // ---- DOM helpers ----
  function $(id) { return document.getElementById(id); }
  function fmt(bb) {
    return +bb.toFixed(2)+'bb';
  }
  function setMsg(txt) { $('msg-banner').textContent = txt; }
  function addLog(txt, type) {
    var el=$('log');
    var d=document.createElement('div');
    d.className='log-line'+(type?' '+type:'');
    d.textContent=txt;
    el.appendChild(d);
    el.scrollTop=el.scrollHeight;
  }
  function makeCard(card, faceDown) {
    var d=document.createElement('div');
    d.className='card';
    if (faceDown) {
      d.classList.add('down');
    } else {
      d.classList.add(cColor(card));
      var rank=cRank(card), sym=SYM[cSuit(card)];
      var dr=rank==='T'?'10':rank;
      var tl=document.createElement('div'); tl.className='card-corner card-tl';
      tl.innerHTML='<div class="card-rank">'+dr+'</div><div class="card-suit-sm">'+sym+'</div>';
      var ctr=document.createElement('div'); ctr.className='card-ctr'; ctr.textContent=sym;
      var br=document.createElement('div'); br.className='card-corner card-br';
      br.innerHTML='<div class="card-rank">'+dr+'</div><div class="card-suit-sm">'+sym+'</div>';
      d.appendChild(tl); d.appendChild(ctr); d.appendChild(br);
    }
    return d;
  }

  // ---- Init ----
  function cancelOnlineSetup() {
    if (_guestJoinRef) { _guestJoinRef.off(); _guestJoinRef = null; }
    onlineMode = false;
    myPid = -1;
    roomCode = null;
    turnSeqNum = 0; _lastSyncedTurnId = 0; _lastTurnData = null;
    $('host-settings').style.display = '';
    $('btn-create-room').style.display = '';
    $('host-waiting').style.display = 'none';
  }

  function cancelRoom() {
    if (db && roomCode) db.ref('rooms/'+roomCode).remove();
    cancelOnlineSetup();
  }

  function startGame() {
    cancelOnlineSetup();
    var cfg = {
      startStack: parseFloat($('cfg-stack').value)||100,
      timeLimit:  parseInt($('cfg-time').value)||20,
      names: [$('cfg-p1').value||'Player 1', $('cfg-p2').value||'Player 2'],
      evSplit: $('cfg-ev-split').checked
    };
    $('setup-screen').style.display='none';
    $('game-screen').style.display='flex';
    newMatch(cfg);
  }

  function newMatch(cfg) {
    G = {
      cfg: cfg,
      handNum: 1,
      stacks: [cfg.startStack, cfg.startStack],
      dealer: Math.random()<0.5?0:1,  // dealer = SB in HU
      // per-hand
      deck: [],
      hole: [null,null],       // [card1,card2] per player
      board: [],               // community cards
      pot: 0,
      bets: [0,0],
      street: 'preflop',
      actPid: -1,
      // ranges[pid][r][c] = map of comboKey → action
      ranges: [null,null],
      narrowed: [null,null],   // Set of comboKeys still in range after action
      // bet tracking
      curBetTo: 0,
      lastRaiseAmt: 0,
      // street tracking
      streetChecked: [false,false],
      streetActed:   [false,false],
      // misc
      draft: [null,null],
      draftBetSz: [null,null],
      timerInt: null,
      timerLeft: cfg.timeLimit,
      handOver: false,
      allIn: false,
      pendingAction: null,
    };
    updateUI();
    dealHand();
  }

  function openSettings() {
    if (!G) return;
    var s=prompt('Starting stack (bb) — takes effect next match:', G.cfg.startStack);
    if (s) G.cfg.startStack=parseFloat(s)||G.cfg.startStack;
    var t=prompt('Time per turn (sec):', G.cfg.timeLimit);
    if (t) G.cfg.timeLimit=parseInt(t)||G.cfg.timeLimit;
  }

  // ---- UI update ----
  function updateUI() {
    if (!G) return;
    // Stacks
    // Names & positions
    for (var p=0;p<2;p++) {
      $('pname'+p).textContent=G.cfg.names[p];
      $('dbtn'+p).className='dealer-btn'+(G.dealer===p?' show':'');
      $('pos'+p).textContent=G.dealer===p?'SB':'BB';
    }
    // Pot
    $('pot-disp').textContent='Pot: '+fmt(G.pot);
    // Bets & stacks
    $('bdisp0').textContent=G.bets[0]>0?fmt(G.bets[0]):'';
    $('bdisp1').textContent=G.bets[1]>0?fmt(G.bets[1]):'';
    $('sdisp0').textContent=fmt(G.stacks[0]);
    $('sdisp1').textContent=fmt(G.stacks[1]);
  }

  // ---- Deal ----
  function dealHand() {
    if (onlineMode && myPid === 1) {
      // Guest: host will write the hand to Firebase; wait for the listener to fire
      setMsg('Waiting for host to deal…');
      return;
    }
    G.deck = shuffle(buildDeck());
    G.hole[0] = [G.deck.pop(), G.deck.pop()];
    G.hole[1] = [G.deck.pop(), G.deck.pop()];
    if (onlineMode) writeHandToFirebase();
    startHandUI();
  }

  function startHandUI() {
    G.board = [];
    renderHole(0, debugMode);
    renderHole(1, debugMode);
    renderBoard();
    $('log').innerHTML='';
    updateUI();
    postBlinds();
    G.narrowed=[null,null];
    initRange(0); initRange(1);
    startStreet('preflop');
  }

  function renderHole(pid, reveal) {
    var el=$('hc'+pid);
    el.innerHTML='';
    if (!G.hole[pid]) { el.appendChild(makeCard('',true)); el.appendChild(makeCard('',true)); return; }
    for (var c of G.hole[pid]) el.appendChild(makeCard(c, !reveal));
  }

  function renderBoard(newFrom) {
    for (var i=0;i<5;i++) {
      var slot=$('cc'+i);
      slot.innerHTML='';
      if (G.board[i]) {
        var card=makeCard(G.board[i],false);
        if (newFrom!=null && i>=newFrom) {
          var delay=(i-newFrom)*90;
          card.style.animation='ccReveal 0.22s ease-out '+delay+'ms both';
        }
        slot.appendChild(card);
      }
    }
  }

  // ---- Blinds ----
  function postBlinds() {
    var sb=G.dealer, bb=1-G.dealer;
    var sbAmt=Math.min(0.5, G.stacks[sb]);
    var bbAmt=Math.min(1,   G.stacks[bb]);
    G.stacks[sb]-=sbAmt; G.bets[sb]=sbAmt;
    G.stacks[bb]-=bbAmt; G.bets[bb]=bbAmt;
    G.curBetTo=bbAmt;
    G.lastRaiseAmt=bbAmt;
    G.pot=0;
    addLog(G.cfg.names[sb]+' posts SB '+fmt(sbAmt)+', '+G.cfg.names[bb]+' posts BB '+fmt(bbAmt), 'log-info');
    updateUI();
  }

  // ---- Streets ----
  function startStreet(street) {
    G.street=street;
    G.streetChecked=[false,false];
    G.streetActed=[false,false];

    // Who acts first
    var first = street==='preflop' ? G.dealer : (1-G.dealer); // SB first preflop, BB first postflop
    startTurn(first);
  }

  function collectBets() {
    G.pot+=G.bets[0]+G.bets[1];
    G.bets=[0,0];
    G.curBetTo=0;
    G.lastRaiseAmt=0;
    updateUI();
  }

  function advanceStreet() {
    var order=['preflop','flop','turn','river'];
    var idx=order.indexOf(G.street);
    collectBets();
    if (idx>=3) { showdown(); return; }
    var next=order[idx+1];
    var prevLen=G.board.length;
    if (next==='flop')  { G.board.push(G.deck.pop(),G.deck.pop(),G.deck.pop()); }
    else                { G.board.push(G.deck.pop()); }
    renderBoard(prevLen);
    startStreet(next);
  }

  // ---- Turn ----
  function startTurn(pid) {
    G.actPid=pid;
    if (onlineMode && myPid === 0) {
      db.ref('rooms/'+roomCode+'/currentTurn').set({
        pid: pid, turnId: ++turnSeqNum,
        startedAt: firebase.database.ServerValue.TIMESTAMP
      });
    }
    suitFilter.suited=new Set(SUITED_SUITS);
    suitFilter.offsuit=new Set(OFFSUIT_SUITS);
    suitFilter.pair=new Set(PAIR_SUITS);
    refreshSuitFilterBtns();
    initRange(pid);
    earlyFolded[pid] = new Set();
    G.draft[pid]=null;
    G.draftBetSz[pid]=null;
    undoStack=[];
    $('undo-btn').disabled=true;
    $('bet-inp').value='';

    colorChart(pid, true);
    colorChart(1-pid, false);
    updateRangeSum(pid);
    updateRangeSum(1-pid);
    buildComboStrengthIndex();
    updateBarToggle();
    updateRangeDist(pid);
    updateSlotsDisabled();

    $('wait'+pid).textContent='';
    $('wait'+(1-pid)).textContent='Waiting...';

    if (onlineMode && pid !== myPid) {
      hideActionPanel();
      setMsg('Waiting for '+G.cfg.names[pid]+'…');
      startTimer(pid, function(){}); // display only — submit fires on the active player's browser
      return;
    }

    renderChartListeners(pid);
    showActionPanel(pid);
    setMsg(G.cfg.names[pid]+': assign hand ranges, then submit');
    startTimer(pid, function(){ submit(true); });
  }

  // ---- Range Init ----
  function initRange(pid) {
    var facing = isFacing(pid);
    var defAction = facing ? 'fold' : 'check';
    // Only exclude board cards (public info). Opponent hole cards are hidden
    // so excluding them would leak info and reduce count from 1326 to 1225.
    var excluded = [...G.board];
    G.ranges[pid] = [];
    for (var r=0;r<13;r++) {
      G.ranges[pid][r]=[];
      for (var c=0;c<13;c++) {
        var ht=cellHT(r,c);
        var combos=combosFor(ht);
        var map={};
        for (var combo of combos) {
          var c1=combo.slice(0,2), c2=combo.slice(2,4);
          if (excluded.includes(c1)||excluded.includes(c2)) continue;
          var ck=cKey(c1,c2);
          // If the player's range has been narrowed (they already acted this hand),
          // only include combos still in their range. All others are grayed out.
          if (G.narrowed[pid]!==null && !G.narrowed[pid].has(ck)) continue;
          map[ck]=defAction;
        }
        G.ranges[pid][r][c]=map;
      }
    }
  }

  function isFacing(pid) {
    return (G.curBetTo - G.bets[pid]) > 0;
  }

  // ---- Chart rendering ----
  function colorChart(pid, isActive) {
    var chart=$('chart'+pid);
    chart.querySelectorAll('.hc').forEach(function(cell) {
      var r=+cell.dataset.r, c=+cell.dataset.c;
      var type=cellType(r,c);
      var suits=typeSuits(type);
      var map=G.ranges[pid] ? G.ranges[pid][r][c] : null;
      cell.querySelectorAll('.hc-suit').forEach(function(sr, idx) {
        var suit=suits[idx];
        var ck=map ? htSuitKey(r,c,suit) : null;
        var inRange=map && (ck in map);
        if (!inRange) {
          sr.style.background = (ck && earlyFolded[pid].has(ck)) ? '#172540' : '#0a0f0a';
        } else if (isActive) {
          if (!suitFilter[type].has(suit)) {
            sr.style.background='#162e16'; // toggled off — shown as dim gray
          } else {
            sr.style.background=actionColor(map[ck]);
          }
        } else {
          var inNarrowed=G.narrowed[pid]===null || G.narrowed[pid].has(ck);
          sr.style.background=inNarrowed ? '#7d6608' : '#0a0f0a';
        }
      });
    });
  }

  function updateRangeSum(pid) {
    var el=$('rsum'+pid);
    if (G.narrowed[pid]!==null) {
      el.textContent=G.narrowed[pid].size+' combos in range';
    } else if (G.ranges[pid]) {
      var n=0;
      for(var r=0;r<13;r++) for(var c=0;c<13;c++) {
        var m=G.ranges[pid][r][c];
        n+=Object.keys(m).length;
      }
      el.textContent=n+' combos';
    } else {
      el.textContent='';
    }
  }

  function updateRangeDist(pid) {
    var distEl=$('range-dist');
    var barEl=$('range-dist-bar');
    if (!distEl||!barEl) return;
    var counts={};
    var total=0;
    for (var r=0;r<13;r++) for (var c=0;c<13;c++) {
      var map=G.ranges[pid][r][c];
      for (var ck in map) {
        var a=map[ck];
        counts[a]=(counts[a]||0)+1;
        total++;
      }
    }
    // Include early-folded combos in the fold count so stripping them doesn't
    // change the displayed fold frequency.
    var ef = earlyFolded[pid] ? earlyFolded[pid].size : 0;
    if (ef > 0) { counts['fold'] = (counts['fold'] || 0) + ef; total += ef; }
    if (total===0) { distEl.textContent=''; barEl.innerHTML=''; return; }
    var order=['fold','check','call','bet','raise'];
    var colors={fold:'#1e4a96',check:'#1a8a44',call:'#1a8a44',bet:'#9b2020',raise:'#9b2020'};
    var parts=[];
    order.forEach(function(a){
      if (counts[a]) parts.push({a:a,n:counts[a]});
    });
    distEl.textContent=parts.map(function(p){
      return p.a.charAt(0).toUpperCase()+p.a.slice(1)+' '+Math.round(p.n/total*100)+'%';
    }).join(' · ');
    barEl.innerHTML=parts.map(function(p){
      var pct=(p.n/total*100).toFixed(2);
      return '<span style="width:'+pct+'%;background:'+colors[p.a]+'"></span>';
    }).join('');
    barEl.style.display = barView==='freq' ? '' : 'none';
    renderStrengthBars();
  }

  // ---- Strength Bar ----
  var comboStrengthGroups = null;
  var barView = 'freq';

  function setBarView(v) {
    barView = v;
    $('bar-toggle-freq').classList.toggle('active', v==='freq');
    $('bar-toggle-strength').classList.toggle('active', v==='strength');
    $('range-dist-bar').style.display = v==='freq' ? '' : 'none';
    if (v==='strength' && comboStrengthGroups) {
      renderStrengthBars();
    } else {
      $('strength-bar-wrap').classList.remove('visible');
    }
  }

  function toggleStrengthEnlarge(e) {
    var popup=$('strength-popup');
    if (popup.classList.contains('visible')) return;
    e.stopPropagation();
    renderStrengthBarsInto($('sbar0-lg'), $('sbar1-lg'));
    popup.classList.add('visible');
    var wrap=$('strength-bar-wrap');
    var rect=wrap.getBoundingClientRect();
    var pw=popup.offsetWidth||600;
    var left=rect.left+rect.width/2-pw/2;
    left=Math.max(8, Math.min(left, window.innerWidth-pw-8));
    var top=rect.bottom+8;
    if (top+250>window.innerHeight) top=rect.top-250-8;
    popup.style.left=left+'px';
    popup.style.top=top+'px';
    function dismiss() {
      popup.classList.remove('visible');
      document.removeEventListener('click', dismiss);
    }
    document.addEventListener('click', dismiss);
  }

  function updateBarToggle() {
    var strengthBtn = $('bar-toggle-strength');
    var available = !!comboStrengthGroups;
    strengthBtn.disabled = !available;
    strengthBtn.style.opacity = available ? '' : '0.35';
    strengthBtn.style.cursor = available ? '' : 'default';
    if (!available && barView==='strength') setBarView('freq');
  }

  function comboToRC(ck) {
    var c1=ck.slice(0,2), c2=ck.slice(2,4);
    var ri1=RANKS.indexOf(cRank(c1)), ri2=RANKS.indexOf(cRank(c2));
    var s1=cSuit(c1), s2=cSuit(c2);
    if (ri1===ri2) return {r:ri1,c:ri1};
    if (s1===s2) return {r:Math.min(ri1,ri2),c:Math.max(ri1,ri2)};
    return {r:Math.max(ri1,ri2),c:Math.min(ri1,ri2)};
  }

  function buildComboStrengthIndex() {
    if (!G.board||G.board.length===0) { comboStrengthGroups=null; return; }
    var boardSet=new Set(G.board);
    var scored=[];
    for (var ri=0;ri<13;ri++) {
      for (var ci=0;ci<13;ci++) {
        var type=cellType(ri,ci);
        for (var suit of typeSuits(type)) {
          var ck=htSuitKey(ri,ci,suit);
          var c1=ck.slice(0,2), c2=ck.slice(2,4);
          if (boardSet.has(c1)||boardSet.has(c2)) continue;
          var score=evalHand([c1,c2].concat(G.board)).rank;
          scored.push({ck:ck,score:score});
        }
      }
    }
    scored.sort(function(a,b){return a.score-b.score;});
    var groups=[];
    var i=0;
    while (i<scored.length) {
      var s=scored[i].score;
      var combos=[];
      while (i<scored.length&&scored[i].score===s) { combos.push(scored[i].ck); i++; }
      groups.push({score:s,combos:combos});
    }
    comboStrengthGroups=groups;
  }

  function renderStrengthBarsInto(bar0, bar1) {
    for (var p=0;p<2;p++) {
      var barEl=p===0?bar0:bar1;
      if (!barEl) continue;
      var isActive=(p===G.actPid);
      var html='';
      comboStrengthGroups.forEach(function(group){
        var raiseN=0,callN=0,foldN=0,unassignedN=0,notInRangeN=0,inrangeN=0;
        group.combos.forEach(function(ck){
          var rc=comboToRC(ck);
          var action=isActive&&G.ranges[p] ? G.ranges[p][rc.r][rc.c][ck] : null;
          var inNarrowed=G.narrowed[p]===null||(G.narrowed[p]&&G.narrowed[p].has(ck));
          if (action==='raise'||action==='bet') raiseN++;
          else if (action==='call'||action==='check') callN++;
          else if (action==='fold') foldN++;
          else if (inNarrowed) { if (isActive) unassignedN++; else inrangeN++; }
          else notInRangeN++;
        });
        var inner='';
        if (isActive) {
          if (notInRangeN) inner+='<div style="flex:'+notInRangeN+';background:#111"></div>';
          if (unassignedN) inner+='<div style="flex:'+unassignedN+';background:#444"></div>';
          if (foldN)       inner+='<div style="flex:'+foldN+';background:#2d5070"></div>';

        } else {

        }
        html+='<div style="flex:'+group.combos.length+';display:flex;flex-direction:column;overflow:hidden">'+inner+'</div>';
      });
      barEl.innerHTML=html;
    }
  }

  // ---- Drag selection ----
  var selMode = 'free'; // 'rect' | 'free'
  var drag = { on:false, startR:-1, startC:-1, pid:-1, cells: new Set(), removing:false, gesture: new Set() };
  var undoStack = [];
  var preflopSlots = [
    [null,null,null,null,null],
    [null,null,null,null,null]
  ];

  function deselectAll() {
    drag.cells=new Set();
    refreshDragHighlight();
  }

  function selectAll() {
    var pid=G.actPid;
    for(var r=0;r<13;r++) for(var c=0;c<13;c++){
      var map=G.ranges[pid][r][c];
      var type=cellType(r,c);
      var filter=suitFilter[type];
      for(var suit of typeSuits(type)){
        if(!filter.has(suit)) continue;
        var ck=htSuitKey(r,c,suit);
        if(ck in map){ drag.cells.add(r+','+c); break; }
      }
    }
    refreshDragHighlight();
  }

  function toggleSelectAll() {
    if(drag.cells.size===0) selectAll(); else deselectAll();
  }

  function setSelMode(mode) {
    selMode = mode;
    document.getElementById('mode-rect').classList.toggle('active', mode==='rect');
    document.getElementById('mode-free').classList.toggle('active', mode==='free');
  }

  function renderChartListeners(pid) {
    var chart=$('chart'+pid);
    // Remove old listeners by replacing (clone)
    var newChart=chart.cloneNode(true);
    chart.parentNode.replaceChild(newChart, chart);
    var nc=$('chart'+pid);

    nc.addEventListener('mousedown', function(e) {
      if (G.actPid!==pid) return;
      var cell=e.target.closest('.hc');
      if (!cell) return;
      e.preventDefault();
      var key=cell.dataset.r+','+cell.dataset.c;
      drag.removing = drag.cells.has(key);
      drag.on=true; drag.pid=pid;
      drag.startR=+cell.dataset.r; drag.startC=+cell.dataset.c;
      drag.prevCells=new Set(drag.cells); // snapshot before this drag
      drag.gesture=new Set([key]);
      // Apply first cell immediately
      if (drag.removing) drag.cells.delete(key); else drag.cells.add(key);
      refreshDragHighlight();
    });

    nc.addEventListener('mousemove', function(e) {
      if (!drag.on||drag.pid!==pid) return;
      var cell=e.target.closest('.hc');
      if (!cell) return;
      if (selMode==='free') {
        var key=cell.dataset.r+','+cell.dataset.c;
        drag.gesture.add(key);
        if (drag.removing) drag.cells.delete(key); else drag.cells.add(key);
      } else {
        var cr=+cell.dataset.r, cc=+cell.dataset.c;
        var minR=Math.min(drag.startR,cr), maxR=Math.max(drag.startR,cr);
        var minC=Math.min(drag.startC,cc), maxC=Math.max(drag.startC,cc);
        // Rebuild the rect relative to start, then apply to the accumulated set
        drag.cells=new Set(drag.prevCells||[]);
        for(var rr=minR;rr<=maxR;rr++) for(var cc2=minC;cc2<=maxC;cc2++) {
          var k=rr+','+cc2;
          if (drag.removing) drag.cells.delete(k); else drag.cells.add(k);
        }
      }
      refreshDragHighlight();
    });
  }

  function refreshDragHighlight() {
    var chart=$('chart'+G.actPid);
    if (!chart) return;
    chart.querySelectorAll('.hc').forEach(function(cell){
      var key=cell.dataset.r+','+cell.dataset.c;
      var on=drag.cells.has(key);
      cell.dataset.dragsel=on?'1':'0';
      if (on) cell.classList.add('drag-sel');
      else cell.classList.remove('drag-sel');
    });
    var btn=$('sel-all-btn');
    if(btn){
      if(drag.cells.size===0){ btn.innerHTML='+<br>Select All'; btn.style.color=''; }
      else { btn.innerHTML='✕<br>Deselect All'; btn.style.color='#c0392b'; }
    }
  }

  document.addEventListener('mouseup', function(e) {
    if (!drag.on) return;
    drag.on=false;
    // Selection stays highlighted; click an action button to assign
  });

  function sfToggle(type, suit, btn) {
    if (suitFilter[type].has(suit)) { suitFilter[type].delete(suit); btn.classList.add('off'); }
    else { suitFilter[type].add(suit); btn.classList.remove('off'); }
    if (G && G.actPid>=0 && !G.handOver) colorChart(G.actPid, true);
  }

  function sfAddSuit(type, suitChar) {
    var all = typeSuits(type);
    var matching = new Set(all.filter(function(s){ return s[0]===suitChar||s[1]===suitChar; }));
    for (var suit of all) {
      if (matching.has(suit)) { suitFilter[type].add(suit); } else { suitFilter[type].delete(suit); }
      var btn=$('sf-'+type+'-'+suit);
      if (btn) btn.classList.toggle('off', !matching.has(suit));
    }
    if (G && G.actPid>=0 && !G.handOver) colorChart(G.actPid, true);
  }

  function sfSetAll(type, on) {
    var suits=typeSuits(type);
    for (var suit of suits) {
      if (on) suitFilter[type].add(suit); else suitFilter[type].delete(suit);
      var btn=$('sf-'+type+'-'+suit);
      if (btn) btn.classList.toggle('off',!on);
    }
    if (G && G.actPid>=0 && !G.handOver) colorChart(G.actPid, true);
  }

      for(var suit of typeSuits(type)){
        var btn=$('sf-'+type+'-'+suit);
        if(btn) btn.classList.toggle('off',!suitFilter[type].has(suit));
      }
    }
  }

  // Returns {suited,offsuit,pair} Sets of suit combos that produce the given flush category,
  // or null if the category doesn't need a suit-filter override.
  function autoSuitFilter(catId, ba) {
    var sc=ba.suitCounts;
    if(catId==='flush'||catId==='straightflush'){
      var suited=new Set(), offsuit=new Set(), pair=new Set();
      for(var s of SUITED_SUITS){
        if((sc[s[0]]||0)+2>=5) suited.add(s);
      }
      for(var s of OFFSUIT_SUITS){
        if((sc[s[0]]||0)+1>=5||(sc[s[1]]||0)+1>=5) offsuit.add(s);
      }
      for(var s of PAIR_SUITS){
        if((sc[s[0]]||0)+1>=5||(sc[s[1]]||0)+1>=5) pair.add(s);
      }
      return {suited:suited,offsuit:offsuit,pair:pair};
    }
    if(catId==='flushdraw'){
      var suited=new Set(), offsuit=new Set(), pair=new Set();
      for(var s of SUITED_SUITS){
        if((sc[s[0]]||0)+2===4) suited.add(s);
      }
      for(var s of OFFSUIT_SUITS){
        if((sc[s[0]]||0)+1===4||(sc[s[1]]||0)+1===4) offsuit.add(s);
      }
      for(var s of PAIR_SUITS){
        if((sc[s[0]]||0)+1===4||(sc[s[1]]||0)+1===4) pair.add(s);
      }
      return {suited:suited,offsuit:offsuit,pair:pair};
    }
    return null;
  }

  // ---- Hand type category selection ----

  function boardAnalysis(board) {
    var rc={}, sc={s:0,h:0,d:0,c:0};
    for(var card of board){ var rk=cRank(card), sk=cSuit(card); rc[rk]=(rc[rk]||0)+1; sc[sk]++; }
    var ur=Object.keys(rc).sort(function(a,b){return RVAL[b]-RVAL[a];});
    return {rankCounts:rc, suitCounts:sc, uniqueRanks:ur,
            isPaired:Object.values(rc).some(function(c){return c>=2;}),
            topRankVal:ur.length>0?RVAL[ur[0]]:0};
  }

  function hasStraightRanks(rvArr) {
    var s=new Set(rvArr);
    if(s.has(14)) s.add(1);
    for(var lo=1;lo<=10;lo++)
      if([lo,lo+1,lo+2,lo+3,lo+4].every(function(r){return s.has(r);})) return true;
    return false;
  }

  function isStraightPossible(ba) {
    var s=new Set(ba.uniqueRanks.map(function(r){return RVAL[r];}));
    if(s.has(14)) s.add(1);
    for(var lo=1;lo<=10;lo++)
      if([lo,lo+1,lo+2,lo+3,lo+4].filter(function(r){return s.has(r);}).length>=3) return true;
    return false;
  }

  function isDrawPossible(ba) {
    var s=new Set(ba.uniqueRanks.map(function(r){return RVAL[r];}));
    if(s.has(14)) s.add(1);
    for(var lo=1;lo<=10;lo++)
      if([lo,lo+1,lo+2,lo+3,lo+4].filter(function(r){return s.has(r);}).length>=2) return true;
    return false;
  }

  function isFlushHand(c1,c2,ba) {
    var sc=Object.assign({},ba.suitCounts);
    sc[cSuit(c1)]++; sc[cSuit(c2)]++;
    return Object.values(sc).some(function(c){return c>=5;});
  }

  function isStraightHand(c1,c2,board) {
    return hasStraightRanks([c1,c2].concat(board).map(function(c){return RVAL[cRank(c)];}));
  }

  function isPairAtRank(c1,c2,rank,ba) {
    if(!rank||ba.rankCounts[rank]!==1) return false;
    var r1=cRank(c1),r2=cRank(c2);
    if(r1===r2) return false;
    if((r1===rank)===(r2===rank)) return false; // neither or both hit rank
    var other=(r1===rank)?r2:r1;
    if(!ba.rankCounts[other]) return true;
    if(!ba.isPaired) return false; // two pair on unpaired board
    if(ba.rankCounts[other]!==1) return false; // other hits a paired rank → full house territory
    // counterfeit two pair on paired board: only count the higher hole card's pair
    return RVAL[rank]>RVAL[other];
  }

  function isOverpair(c1,c2,ba) {
    var r1=cRank(c1),r2=cRank(c2);
    if(r1!==r2||ba.rankCounts[r1]) return false;
    return RVAL[r1]>ba.topRankVal;
  }

  function isUnderpair(c1,c2,ba) {
    var r1=cRank(c1),r2=cRank(c2);
    if(r1!==r2||ba.rankCounts[r1]) return false;
    return RVAL[r1]<ba.topRankVal;
  }

  function isFlushDraw(c1,c2,ba) {
    var sc=Object.assign({},ba.suitCounts);
    sc[cSuit(c1)]++; sc[cSuit(c2)]++;
    return Object.values(sc).some(function(c){return c===4;});
  }

  function getStraightDrawType(c1,c2,board) {
    var allRV=[c1,c2].concat(board).map(function(c){return RVAL[cRank(c)];});
    if(hasStraightRanks(allRV)) return null;
    var s=new Set(allRV);
    if(s.has(14)) s.add(1);
    var oesd=false,gutshot=false;
    for(var lo=1;lo<=10;lo++){
      var win=[lo,lo+1,lo+2,lo+3,lo+4];
      if(win.filter(function(r){return s.has(r);}).length===4){
        var mi=win.findIndex(function(r){return !s.has(r);});
        if((mi===0&&lo+4<14)||(mi===4&&lo>1)) oesd=true; else gutshot=true;
      }
    }
    return {oesd:oesd,gutshot:gutshot};
  }

  function isTwoPair(c1,c2,ba) {
    if(ba.isPaired) return false;
    var r1=cRank(c1),r2=cRank(c2);
    if(r1===r2) return false;
    return !!(ba.rankCounts[r1]&&ba.rankCounts[r2]);
  }

  function isSet(c1,c2,ba) {
    if(ba.isPaired) return false;
    var r1=cRank(c1),r2=cRank(c2);
    if(r1!==r2) return false;
    return !!ba.rankCounts[r1];
  }

  function handTier(c1,c2,board) {
    var h=evalHand([c1,c2].concat(board)).rank;
    if(h>=8e8) return 8;
    if(h>=7e8) return 7; // quads
    if(h>=6e8) return 6; // full house
    if(h>=5e8) return 5; // flush
    if(h>=4e8) return 4; // straight
    if(h>=3e8) return 3; // trips
    if(h>=2e8) return 2;
    if(h>=1e8) return 1;
    return 0;
  }

  function matchesCategory(c1,c2,catId,ba,board) {
    switch(catId){
      case 'flush':        return isFlushHand(c1,c2,ba);
      case 'straightflush':return handTier(c1,c2,board)===8;
      case 'straight':     return isStraightHand(c1,c2,board);
      case 'pair0':     return isPairAtRank(c1,c2,ba.uniqueRanks[0],ba);
      case 'pair1':     return isPairAtRank(c1,c2,ba.uniqueRanks[1],ba);
      case 'pair2':     return isPairAtRank(c1,c2,ba.uniqueRanks[2],ba);
      case 'pair3':     return isPairAtRank(c1,c2,ba.uniqueRanks[3],ba);
      case 'pair4':     return isPairAtRank(c1,c2,ba.uniqueRanks[4],ba);
      case 'overpair':  return isOverpair(c1,c2,ba);
      case 'underpair': return isUnderpair(c1,c2,ba);
      case 'flushdraw': return isFlushDraw(c1,c2,ba);
      case 'oesd':      { var dt=getStraightDrawType(c1,c2,board); return !!(dt&&dt.oesd); }
      case 'gutshot':   { var dt2=getStraightDrawType(c1,c2,board); return !!(dt2&&dt2.gutshot); }
      case 'twopair':   return isTwoPair(c1,c2,ba);
      case 'set':       return isSet(c1,c2,ba);
      case 'trips':     return handTier(c1,c2,board)===3;
      case 'fullhouse': return handTier(c1,c2,board)===6;
      case 'quads':     return handTier(c1,c2,board)===7;
      case 'nothing': {
        var isRiv=board&&board.length===5;
        var allIds=['flush','straightflush','straight','pair0','pair1','pair2','pair3','pair4',
                    'overpair','underpair','twopair','set','trips','fullhouse','quads'];
        if(!isRiv) allIds.push('flushdraw','oesd','gutshot');
        return allIds.every(function(id){ return !matchesCategory(c1,c2,id,ba,board); });
      }
      default: return false;
    }
  }

  function getHandCategories(pid, board) {
    if(!board||board.length===0) return [];
    var ba=boardAnalysis(board);
    var isRiver=board.length===5;

    var counts={flush:0,straightflush:0,straight:0,p0:0,p1:0,p2:0,p3:0,p4:0,
                overpair:0,underpair:0,flushdraw:0,oesd:0,gutshot:0,
                twopair:0,set:0,trips:0,fullhouse:0,quads:0,nothing:0};

    var validPairIdxs=ba.uniqueRanks.map(function(r,i){return {r:r,i:i};})
                        .filter(function(x){return ba.rankCounts[x.r]===1&&x.i<5;});
    var checkFlush=Object.values(ba.suitCounts).some(function(c){return c>=3;});
    var checkSt=isStraightPossible(ba);
    var checkFD=!isRiver&&Object.values(ba.suitCounts).some(function(c){return c>=2;});
    var checkDr=!isRiver&&isDrawPossible(ba);

    for(var row=0;row<13;row++) for(var col=0;col<13;col++){
      var map=G.ranges[pid][row][col];
      var type=cellType(row,col);
      for(var suit of typeSuits(type)){
        var ck=htSuitKey(row,col,suit);
        if(!(ck in map)) continue;
        var c1=ck.slice(0,2),c2=ck.slice(2,4);
        var _any=false;
        if(checkFlush&&isFlushHand(c1,c2,ba)){counts.flush++;_any=true;}
        if(checkFlush&&checkSt&&handTier(c1,c2,board)===8){counts.straightflush++;_any=true;}
        if(checkSt&&isStraightHand(c1,c2,board)){counts.straight++;_any=true;}
        for(var pp of validPairIdxs) if(isPairAtRank(c1,c2,pp.r,ba)){counts['p'+pp.i]++;_any=true;}
        if(ba.topRankVal<14&&isOverpair(c1,c2,ba)){counts.overpair++;_any=true;}
        if(ba.uniqueRanks.length>0&&isUnderpair(c1,c2,ba)){counts.underpair++;_any=true;}
        if(checkFD&&isFlushDraw(c1,c2,ba)){counts.flushdraw++;_any=true;}
        if(checkDr){var dt=getStraightDrawType(c1,c2,board);if(dt){if(dt.oesd){counts.oesd++;_any=true;}if(dt.gutshot){counts.gutshot++;_any=true;}}}
        if(!ba.isPaired){if(isTwoPair(c1,c2,ba)){counts.twopair++;_any=true;}if(isSet(c1,c2,ba)){counts.set++;_any=true;}}
        if(ba.isPaired){var t=handTier(c1,c2,board);if(t===3){counts.trips++;_any=true;}else if(t===6){counts.fullhouse++;_any=true;}else if(t===7){counts.quads++;_any=true;}}
        if(!_any) counts.nothing++;
      }
    }

    var cats=[];
    var pnames=['Top Pair','2nd Pair','3rd Pair','4th Pair','5th Pair'];
    if(counts.straightflush>0) cats.push({id:'straightflush',label:'Str. Flush',n:counts.straightflush});
    if(ba.isPaired&&counts.quads>0) cats.push({id:'quads',label:'Quads',n:counts.quads});
    if(ba.isPaired&&counts.fullhouse>0) cats.push({id:'fullhouse',label:'Full House',n:counts.fullhouse});
    if(counts.flush>0) cats.push({id:'flush',label:'Flush',n:counts.flush});
    if(counts.straight>0) cats.push({id:'straight',label:'Straight',n:counts.straight});
    if(ba.isPaired&&counts.trips>0) cats.push({id:'trips',label:'Trips',n:counts.trips});
    if(!ba.isPaired&&counts.set>0) cats.push({id:'set',label:'Set',n:counts.set});
    if(!ba.isPaired&&counts.twopair>0) cats.push({id:'twopair',label:'Two Pair',n:counts.twopair});
    if(counts.overpair>0) cats.push({id:'overpair',label:'Overpair',n:counts.overpair});
    validPairIdxs.forEach(function(pp){if(counts['p'+pp.i]>0)cats.push({id:'pair'+pp.i,label:pnames[pp.i],n:counts['p'+pp.i]});});
    if(counts.underpair>0) cats.push({id:'underpair',label:'Underpair',n:counts.underpair});
    if(!isRiver&&counts.flushdraw>0) cats.push({id:'flushdraw',label:'Flush Draw',n:counts.flushdraw});
    if(!isRiver&&counts.oesd>0) cats.push({id:'oesd',label:'OESD',n:counts.oesd});
    if(!isRiver&&counts.gutshot>0) cats.push({id:'gutshot',label:'Gutshot',n:counts.gutshot});
    if(counts.nothing>0) cats.push({id:'nothing',label:'Nothing',n:counts.nothing});
    return cats;
  }

  function selectCategory(catId, ba, board) {
    var pid=G.actPid;
    var asf=autoSuitFilter(catId,ba);
    if(asf){
      suitFilter.suited=asf.suited;
      suitFilter.offsuit=asf.offsuit;
      suitFilter.pair=asf.pair;
      refreshSuitFilterBtns();
      colorChart(pid,true);
    }
    for(var r=0;r<13;r++) for(var c=0;c<13;c++){
      var map=G.ranges[pid][r][c];
      var type=cellType(r,c);
      var filter=suitFilter[type];
      var anyMatch=false;
      for(var suit of typeSuits(type)){
        if(!filter.has(suit)) continue;
        var ck=htSuitKey(r,c,suit);
        if(!(ck in map)) continue;
        if(matchesCategory(ck.slice(0,2),ck.slice(2,4),catId,ba,board)){anyMatch=true;break;}
      }
      if(anyMatch) drag.cells.add(r+','+c);
    }
    refreshDragHighlight();
  }

  // ---- Action panel ----

  function showActionPanel(pid) {
    var wb=$('waiting-bars');
    if (wb.classList.contains('visible')) {

      var ap=$('action-panel');
      ap.insertBefore($('bar-toggle-row'), abtns);

    }

    ap.classList.remove('hidden');
    var abtns=$('abtns');

    var facing=isFacing(pid);

    if (!facing) {
      makeABtn('Check','check','aBtn-check');
    } else {
      makeABtn('Call '+fmt(toCall),'call','aBtn-call');
      makeABtn('Fold','fold','aBtn-fold');
    }

    if (!facingAllIn) {

      else makeABtn('Raise','raise','aBtn-raise');

  function makeABtn(label, mode, cls) {
    var b=document.createElement('button');
    b.className='aBtn '+cls;
    b.dataset.mode=mode;
    b.textContent=label;
    b.addEventListener('click', function(){
      if (drag.cells.size>0) assignSelection(G.actPid, mode);
    });
    $('abtns').appendChild(b);
  }

  function updateBetUI(pid) {
    var opp = 1 - pid;
    var myStack = G.stacks[pid];
    var myBet = G.bets[pid];
    var callAmt = Math.max(0, G.curBetTo - myBet);
    var facingAllIn = G.stacks[opp] === 0 || (callAmt > 0 && callAmt >= myStack);
    $('bet-row').style.display = facingAllIn ? 'none' : 'flex';
    $('presets').style.display = facingAllIn ? 'none' : 'flex';

    var effectiveMax = Math.min(myBet + myStack, G.bets[opp] + G.stacks[opp]);
    var pot = G.pot + G.bets[0] + G.bets[1] + callAmt;
    var minRaiseTotal = G.curBetTo===0 ? 1 : G.curBetTo + G.lastRaiseAmt;

    var ps=$('presets');
    ps.innerHTML='';
    var sizes=[
      {l:'Min', v:minRaiseTotal},
      {l:'1/3P', v:+(G.curBetTo+pot/3).toFixed(2)},
      {l:'½P',  v:+(G.curBetTo+pot*0.5).toFixed(2)},
      {l:'¾P',  v:+(G.curBetTo+pot*0.75).toFixed(2)},
      {l:'Pot',  v:+(G.curBetTo+pot).toFixed(2)},
      {l:'Allin',v:effectiveMax},
    ];
    sizes.forEach(function(sz){
      var capped=Math.min(sz.v, effectiveMax);
      if (capped<=G.curBetTo&&sz.l!=='Allin'&&sz.l!=='Min') return;
      var b=document.createElement('button');
      b.className='preset';
      b.textContent=sz.l;
      var illegal = sz.l!=='Allin' && sz.l!=='Min' && sz.v < minRaiseTotal;
      if (illegal) {
        b.disabled=true;
      } else {
        b.addEventListener('click',function(){ $('bet-inp').value=capped.toFixed(2); });
      }
      ps.appendChild(b);
    });

    $('bet-inp').min = minRaiseTotal;
    $('bet-inp').max = effectiveMax;

    // Only set default value when first opening the panel (input is empty)
    if (!$('bet-inp').value) {
      var defBet=G.curBetTo===0?Math.max(+(pot*0.5).toFixed(2),1,minRaiseTotal):minRaiseTotal;
      $('bet-inp').value=Math.min(defBet, effectiveMax).toFixed(2);
    }
  }

  function hideActionPanel() {
    $('action-panel').classList.add('hidden');
    drag.cells=new Set();
    if (comboStrengthGroups) {
      var wb=$('waiting-bars');
      wb.appendChild($('bar-toggle-row'));
      wb.appendChild($('strength-bar-wrap'));
      wb.classList.add('visible');
      $('bar-toggle-freq').style.display = 'none';
      $('bar-toggle-strength').style.borderRadius = '4px';
      setBarView('strength');

  // ---- Assign selection ----
  function assignSelection(pid, action) {
    var delta = {};
    drag.cells.forEach(function(key) {
      var parts=key.split(',');
      var r=+parts[0], c=+parts[1];
      var map=G.ranges[pid][r][c];
      var type=cellType(r,c);
      var filter=suitFilter[type];
      for (var suit of typeSuits(type)) {
        if (!filter.has(suit)) continue;
        var ck=htSuitKey(r,c,suit);
        if (ck in map) { delta[ck]=map[ck]; map[ck]=action; }
      }
    });
    if (Object.keys(delta).length > 0) {
      undoStack.push({ pid: pid, delta: delta });
      $('undo-btn').disabled=false;
    }
    drag.cells=new Set();
    refreshDragHighlight();
    colorChart(pid, true);
    updateRangeSum(pid);
    updateRangeDist(pid);
  }

  function undoLast() {
    if (undoStack.length === 0) return;
    var entry = undoStack.pop();
    var pid = entry.pid;
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var map = G.ranges[pid][r][c];
        for (var ck in map) {
          if (ck in entry.delta) map[ck] = entry.delta[ck];
        }
      }
    }
    $('undo-btn').disabled = undoStack.length === 0;
    colorChart(pid, true);
    updateRangeSum(pid);
    updateRangeDist(pid);
  }

  // ---- Randomize ----
  function toggleRandomize() {
    var body = $('rz-body');
    var open = body.style.display === 'none';
    body.style.display = open ? '' : 'none';
    $('rz-toggle-btn').textContent = (open ? '▾' : '▸') + ' Randomize';
  }

  function updateRandomizeUI(facing, facingAllIn) {
    $('rz-facing').style.display = facing ? '' : 'none';
    $('rz-not-facing').style.display = facing ? 'none' : '';
    var raiseInp = $('rz-raise-pct');
    if (facing && facingAllIn) {
      raiseInp.value = '0';
      raiseInp.disabled = true;
    } else {
      raiseInp.disabled = false;
    }
  }

  function randomizeRange() {
    var pid = G.actPid;
    var facing = isFacing(pid);
    var toCall = Math.min(G.curBetTo - G.bets[pid], G.stacks[pid]);
    var facingAllIn = G.stacks[1 - pid] === 0 || (facing && toCall >= G.stacks[pid]);

    var callPct, raisePct, betPct;
    if (facing) {
      callPct = Math.max(0, Math.min(100, parseFloat($('rz-call-pct').value) || 0));
      raisePct = facingAllIn ? 0 : Math.max(0, Math.min(100, parseFloat($('rz-raise-pct').value) || 0));
      if (callPct + raisePct > 100) {
        alert('Call % and Raise % must not exceed 100%.');
        return;
      }
    } else {
      betPct = Math.max(0, Math.min(100, parseFloat($('rz-bet-pct').value) || 0));
    }

    var delta = {};
    drag.cells.forEach(function(key) {
      var parts = key.split(',');
      var r = +parts[0], c = +parts[1];
      var map = G.ranges[pid][r][c];
      var type = cellType(r, c);
      var filter = suitFilter[type];
      for (var suit of typeSuits(type)) {
        if (!filter.has(suit)) continue;
        var ck = htSuitKey(r, c, suit);
        if (!(ck in map)) continue;
        delta[ck] = map[ck];
        var roll = Math.random() * 100;
        if (facing) {
          if (roll < callPct) map[ck] = 'call';
          else if (roll < callPct + raisePct) map[ck] = 'raise';
          else map[ck] = 'fold';
        } else {
          if (roll < betPct) map[ck] = G.curBetTo > 0 ? 'raise' : 'bet';
          else map[ck] = 'check';
        }
      }
    });

    if (Object.keys(delta).length > 0) {
      undoStack.push({ pid: pid, delta: delta });
      $('undo-btn').disabled = false;
    }
    colorChart(pid, true);
    updateRangeSum(pid);
    updateRangeDist(pid);
  }

  // ---- Fold Early ----
  function foldEarly() {
    var pid = G.actPid;
    var c1 = G.hole[pid][0], c2 = G.hole[pid][1];
    var ck = cKey(c1, c2);
    var ht = handType(c1, c2);
    var cell = htCell(ht);
    var myAction = G.ranges[pid][cell.r][cell.c][ck];

    if (myAction === 'fold') {
      // Actual hand is in the fold range — submit as normal; fold resolves the hand
      submit(false);
    } else {
      // Actual hand is not in the fold range — strip fold combos from range without submitting
      var foldCombos = new Set();
      for (var rr = 0; rr < 13; rr++) {
        for (var cc = 0; cc < 13; cc++) {
          var map = G.ranges[pid][rr][cc];
          for (var k in map) {
            if (map[k] === 'fold') foldCombos.add(k);
          }
        }
      }
      if (foldCombos.size === 0) {
        setMsg('No folding hands assigned.');
        return;
      }
      // Remove fold combos from G.narrowed (or build it from scratch if null)
      if (G.narrowed[pid] === null) {
        var allCombos = new Set();
        for (var rr = 0; rr < 13; rr++) {
          for (var cc = 0; cc < 13; cc++) {
            var map = G.ranges[pid][rr][cc];
            for (var k in map) allCombos.add(k);
          }
        }
        foldCombos.forEach(function(k) { allCombos.delete(k); });
        G.narrowed[pid] = allCombos;
      } else {
        foldCombos.forEach(function(k) { G.narrowed[pid].delete(k); });
      }
      // Remove fold entries from the range maps and track them for ghost rendering
      for (var rr = 0; rr < 13; rr++) {
        for (var cc = 0; cc < 13; cc++) {
          var map = G.ranges[pid][rr][cc];
          for (var k in map) {
            if (map[k] === 'fold') { earlyFolded[pid].add(k); delete map[k]; }
          }
        }
      }
      colorChart(pid, true);
      updateRangeSum(pid);
      renderStrengthBars();
      updateRangeDist(pid);
      setMsg('Folding hands removed — continue assigning your range.');
    }
  }

  // ---- Draft & Submit ----
  function saveDraft() {
    var pid=G.actPid;
    G.draft[pid]=JSON.parse(JSON.stringify(G.ranges[pid]));
    G.draftBetSz[pid]=parseFloat($('bet-inp').value)||null;
    setMsg('Draft saved!');
    setTimeout(function(){ setMsg(G.cfg.names[pid]+': assign hand ranges, then submit'); }, 1200);
  }

  function submit(fromTimer) {
    if ($('action-panel').classList.contains('hidden')) return;
    var pid=G.actPid;
    deselectAll();
    stopTimer();
    hideActionPanel();
    var betSz = fromTimer && G.draftBetSz[pid] != null
      ? G.draftBetSz[pid]
      : parseFloat($('bet-inp').value) || 1;
    if (fromTimer&&G.draft[pid]) G.ranges[pid]=G.draft[pid];

    $('wait'+pid).textContent='';
    $('wait'+(1-pid)).textContent='';
    drag.cells=new Set();

    // Find action for actual hole cards
    var [c1,c2]=G.hole[pid];
    var ht=handType(c1,c2);
    var {r,c}=htCell(ht);
    var map=G.ranges[pid][r][c];
    var ck=cKey(c1,c2);
    var action=map[ck]||(isFacing(pid)?'fold':'check');

    // Build narrowed range: all combos that took same action
    var narrowedSet=new Set();
    for(var rr=0;rr<13;rr++) for(var cc=0;cc<13;cc++) {
      var m=G.ranges[pid][rr][cc];
      for(var k in m) {
        if (m[k]===action) narrowedSet.add(k);
      }
    }
    // Early-folded combos were stripped from ranges but belong in the fold range
    if (action==='fold') earlyFolded[pid].forEach(function(k){ narrowedSet.add(k); });
    G.narrowed[pid]=narrowedSet;

    colorChart(pid, false);
    updateRangeSum(pid);

    addLog(G.cfg.names[pid]+' ('+G.street+'): '+action+(betSz&&(action==='bet'||action==='raise')?' '+fmt(betSz):''), 'log-'+action);
    setMsg(G.cfg.names[pid]+' → '+action+(action==='bet'||action==='raise'?' '+fmt(betSz):''));

    if (onlineMode) writeActionToFirebase(pid, action, betSz, narrowedSet);

    execAction(pid, action, betSz);
  }

  // ---- Execute action ----
  function execAction(pid, action, betSz) {
    var opp=1-pid;
    G.streetActed[pid]=true;

    if (action==='fold') {
      endHand(opp, 'fold'); return;
    }

    if (action==='check') {
      G.streetChecked[pid]=true;
      if (G.street !== 'preflop') $('bdisp'+pid).textContent = 'Check';
      checkAdvance(pid); return;
    }

    if (action==='call') {
      var toCall=Math.min(G.curBetTo-G.bets[pid], G.stacks[pid]);
      G.stacks[pid]-=toCall;
      G.bets[pid]+=toCall;
      updateUI();
      // If all-in
      if (G.stacks[pid]===0||G.stacks[opp]===0) {
        G.allIn=true;
        collectBets();
        runOutBoard(); return;
      }
      // Preflop: if SB calls BB's blind (limp), BB still gets option
      // Detect: preflop, caller is SB(=dealer), and the bet was only 1bb (no prior raise)
      if (G.street==='preflop' && pid===G.dealer && G.lastRaiseAmt<=1 && !G.streetActed[opp]) {
        // BB gets the option
        setTimeout(function(){ startTurn(opp); }, 300);
        return;
      }
      advanceStreet(); return;
    }

    if (action==='bet'||action==='raise') {
      var myBet=G.bets[pid];
      var myStack=G.stacks[pid];
      var effectiveMax=Math.min(myBet+myStack, G.bets[1-pid]+G.stacks[1-pid]);
      var minTotal = G.curBetTo===0 ? Math.max(1, betSz) : G.curBetTo + G.lastRaiseAmt;
      var totalBet=Math.min(betSz, effectiveMax);
      totalBet=Math.max(totalBet, Math.min(minTotal, effectiveMax));
      var extra=totalBet-myBet;
      var paid=Math.min(extra, myStack);
      G.stacks[pid]-=paid;
      G.bets[pid]+=paid;
      var raiseAmt=G.bets[pid]-G.curBetTo;
      G.lastRaiseAmt=Math.max(raiseAmt, G.lastRaiseAmt);
      G.curBetTo=G.bets[pid];
      updateUI();

      if (G.stacks[pid]===0) G.allIn=true;

      // Opponent must act (preserve narrowed ranges from this street)
      setTimeout(function(){ startTurn(opp); }, 300);
      return;
    }
  }

  function checkAdvance(pid) {
    var opp=1-pid;
    if (G.street==='preflop') {
      // Preflop HU: SB(=dealer) acts first. After SB acts, BB acts. If BB checks, done.
      if (pid===G.dealer) {
        // SB just checked (limped) — BB gets option
        setTimeout(function(){ startTurn(opp); }, 300);
      } else {
        // BB checked their option
        advanceStreet();
      }
    } else {
      // Postflop: BB acts first (pid=1-dealer). If first actor checked, second actor gets chance.
      // If both checked, advance.
      if (G.streetChecked[opp]) {
        // Both checked
        advanceStreet();
      } else {
        setTimeout(function(){ startTurn(opp); }, 300);
      }
    }
  }

  // ---- All-in runout ----
  function runOutBoard() {
    while(G.board.length<3) G.board.push(G.deck.pop());
    if(G.board.length<4) G.board.push(G.deck.pop());
    if(G.board.length<5) G.board.push(G.deck.pop());
    renderBoard();
    renderHole(0,true); renderHole(1,true);
    setTimeout(function(){ showdown(); }, 800);
  }

  // ---- Range EV computation ----
  // Returns { ev0, ev1 } — fractions of the pot each player's range wins on average.
  function computeRangeEV(board) {
    var boardSet = new Set(board);

    // Collect valid combos for each player from their narrowed range (or full range).
    function validCombos(pid) {
      var out = [];
      var narrowed = G.narrowed[pid]; // Set<comboKey> or null
      for (var r = 0; r < 13; r++) {
        for (var c = 0; c < 13; c++) {
          var map = G.ranges[pid][r][c];
          if (!map) continue;
          for (var ck in map) {
            if (narrowed !== null && !narrowed.has(ck)) continue;
            // ck is 4 chars: c1[0..1] c2[2..3]
            var card1 = ck.slice(0,2), card2 = ck.slice(2,4);
            if (boardSet.has(card1) || boardSet.has(card2)) continue;
            out.push(ck);
          }
        }
      }
      return out;
    }

    var combos0 = validCombos(0);
    var combos1 = validCombos(1);

    // Pre-compute ranks for every combo before the double loop so evalHand
    // is called O(N) times instead of O(N²).
    var ranks0 = combos0.map(function(ck) {
      return evalHand([ck.slice(0,2), ck.slice(2,4)].concat(board)).rank;
    });
    var ranks1 = combos1.map(function(ck) {
      return evalHand([ck.slice(0,2), ck.slice(2,4)].concat(board)).rank;
    });

    var wins0 = 0, wins1 = 0, ties = 0;
    for (var i = 0; i < combos0.length; i++) {
      var ck0 = combos0[i];
      var a0 = ck0.slice(0,2), b0 = ck0.slice(2,4);
      var r0 = ranks0[i];
      for (var j = 0; j < combos1.length; j++) {
        var ck1 = combos1[j];
        var a1 = ck1.slice(0,2), b1 = ck1.slice(2,4);
        if (a1===a0||a1===b0||b1===a0||b1===b0) continue;
        var r1 = ranks1[j];
        if (r0 > r1) wins0++;
        else if (r1 > r0) wins1++;
        else ties++;
      }
    }

    var total = wins0 + wins1 + ties;
    if (total === 0) return { ev0: 0.5, ev1: 0.5 };
    return { ev0: (wins0 + ties * 0.5) / total, ev1: (wins1 + ties * 0.5) / total };
  }

  // ---- Showdown ----
  function showdown() {
    buildComboStrengthIndex();
    hideActionPanel();
    renderHole(0,true); renderHole(1,true);
    var board=G.board;
    var h0=evalHand([...G.hole[0],...board]);
    var h1=evalHand([...G.hole[1],...board]);
    var pot=G.pot;
    var winner=-1, title, potText, sdP0class, sdP1class;

    if (G.cfg.evSplit) {
      var ev = computeRangeEV(board);
      // Round to nearest 0.01bb (matching bet-sizing granularity)
      var award0 = Math.round(ev.ev0 * pot * 100) / 100;
      var award1 = pot - award0;
      G.stacks[0] += award0;
      G.stacks[1] += award1;
      title = 'Range EV Split';
      potText = G.cfg.names[0]+' +'+fmt(award0)+' ('+Math.round(ev.ev0*1000)/10+'%) · '+G.cfg.names[1]+' +'+fmt(award1)+' ('+Math.round(ev.ev1*1000)/10+'%)';
      // Still highlight winner for CSS (majority EV share), or neutral on near-50/50
      if (award0 > award1) { winner = 0; }
      else if (award1 > award0) { winner = 1; }
      sdP0class = 'sd-player'+(winner===0?' sd-winner':winner===1?' sd-loser':'');
      sdP1class = 'sd-player'+(winner===1?' sd-winner':winner===0?' sd-loser':'');
      addLog('SHOWDOWN (EV): '+G.cfg.names[0]+': '+h0.desc+' | '+G.cfg.names[1]+': '+h1.desc+' → '+potText, 'log-result');
    } else {
      if (h0.rank>h1.rank) { winner=0; title=G.cfg.names[0]+' Wins!'; G.stacks[0]+=pot; }
      else if (h1.rank>h0.rank) { winner=1; title=G.cfg.names[1]+' Wins!'; G.stacks[1]+=pot; }
      else { title='Split Pot!'; G.stacks[0]+=pot/2; G.stacks[1]+=pot/2; }
      potText = winner>=0 ? G.cfg.names[winner]+' wins '+fmt(pot) : 'Split '+fmt(pot);
      sdP0class = 'sd-player'+(winner===0?' sd-winner':winner===1?' sd-loser':'');
      sdP1class = 'sd-player'+(winner===1?' sd-winner':winner===0?' sd-loser':'');
      addLog('SHOWDOWN: '+G.cfg.names[0]+': '+h0.desc+' | '+G.cfg.names[1]+': '+h1.desc+' → '+title, 'log-result');
    }

    G.pot=0; G.handOver=true;
    updateUI();

    // Show overlay
    $('sd-title').textContent=title;
    $('sd-pname0').textContent=G.cfg.names[0];
    $('sd-pname1').textContent=G.cfg.names[1];
    $('sd-h0').textContent=h0.desc;
    $('sd-h1').textContent=h1.desc;
    var c0=$('sd-c0'); c0.innerHTML='';
    var c1=$('sd-c1'); c1.innerHTML='';
    G.hole[0].forEach(function(c){ c0.appendChild(makeCard(c,false)); });
    G.hole[1].forEach(function(c){ c1.appendChild(makeCard(c,false)); });
    $('sd-pot').textContent=potText;
    $('sd-pot').className=G.cfg.evSplit?'ev-split':'';
    $('sd-p0').className=sdP0class;
    $('sd-p1').className=sdP1class;
    $('showdown-overlay').classList.add('show');
  }

  function closeShowdown() {
    $('showdown-overlay').classList.remove('show');
    if (onlineMode && myPid !== 0) {
      setMsg('Waiting for host to start next hand…');
      return;
    }
    if (G.stacks[0]<=0||G.stacks[1]<=0) {
      var wi=G.stacks[0]>0?0:1;
      setMsg(G.cfg.names[wi]+' wins the match!');
      $('next-btn').textContent='Play Again';
      $('next-btn').onclick=function(){ newMatch(G.cfg); };
      $('next-btn').style.display='block';
    } else {
      $('next-btn').textContent='Next Hand';
      $('next-btn').onclick=nextHand;
      $('next-btn').style.display='block';
    }
  }

  // ---- End hand (fold) ----
  function endHand(winnerPid, reason) {
    stopTimer();
    hideActionPanel();
    var pot=G.pot+G.bets[0]+G.bets[1];
    G.stacks[winnerPid]+=pot;
    G.pot=0; G.bets=[0,0];
    G.handOver=true;
    updateUI();
    renderHole(0,true); renderHole(1,true);
    addLog(G.cfg.names[winnerPid]+' wins '+fmt(pot)+' (opponent folded)', 'log-result');
    setMsg(G.cfg.names[winnerPid]+' wins the pot — opponent folded');
    if (onlineMode && myPid !== 0) {
      setMsg(G.cfg.names[winnerPid]+' wins — waiting for host to start next hand…');
      return;
    }
    $('next-btn').textContent=G.stacks[0]>0&&G.stacks[1]>0?'Next Hand':'Play Again';
    $('next-btn').onclick=G.stacks[0]>0&&G.stacks[1]>0?nextHand:function(){ newMatch(G.cfg); };
    $('next-btn').style.display='block';
  }

  // ---- Next hand ----
  function nextHand() {
    $('next-btn').style.display='none';
    G.handNum++;
    G.dealer=1-G.dealer;
    G.narrowed=[null,null];
    G.handOver=false; G.allIn=false;
    G.bets=[0,0]; G.pot=0;
    G.curBetTo=0; G.lastRaiseAmt=0;
    buildChart(0); buildChart(1);
    colorChart(0,false); colorChart(1,false);
    $('rsum0').textContent=''; $('rsum1').textContent='';
    $('wait0').textContent=''; $('wait1').textContent='';
    updateUI();
    dealHand();
  }
