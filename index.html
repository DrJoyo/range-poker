  // ---- Timer ----
  function _startTimerWithRemaining(pid, remaining, onDone) {
    if (G.timerInt) { clearInterval(G.timerInt); G.timerInt=null; }
    var deadline = Date.now() + remaining * 1000;
    var fill=$('tfill'+pid), text=$('ttext'+pid), row=$('timer'+pid);
    row.classList.add('active');
    var pct = Math.max(0, remaining / G.cfg.timeLimit * 100);
    fill.style.transition='none';
    fill.style.width=(100-pct)+'%';
    text.textContent=remaining+'s';
    G.timerInt=setInterval(function(){
      var msLeft = deadline - Date.now();
      if (msLeft <= 0) { stopTimer(); onDone(); return; }
      var left = Math.ceil(msLeft / 1000);
      var p = Math.max(0, msLeft / (G.cfg.timeLimit * 1000) * 100);
      fill.style.transition='width 1s linear';
      fill.style.width=(100-p)+'%';
      text.textContent=left+'s';
    }, 1000);
  }

  function _maybeSyncTimer() {
    if (!_lastTurnData || _pendingTimerPid < 0) return;
    if (_lastTurnData.pid !== _pendingTimerPid) return;
    if (_lastTurnData.turnId <= _lastSyncedTurnId) return; // stale, already used
    _lastSyncedTurnId = _lastTurnData.turnId;
    var elapsed = Math.max(0, (Date.now() + serverTimeOffset) - _lastTurnData.startedAt);
    var remaining = Math.max(0, G.cfg.timeLimit - Math.floor(elapsed / 1000));
    var pid = _pendingTimerPid, onDone = _pendingTimerOnDone;
    _pendingTimerPid = -1; _pendingTimerOnDone = null;
    _startTimerWithRemaining(pid, remaining, onDone);
  }

  function startTimer(pid, onDone) {
    stopTimer();
    if (onlineMode) {
      var fill=$('tfill'+pid), text=$('ttext'+pid), row=$('timer'+pid);
      row.classList.add('active');
      fill.style.transition='none'; fill.style.width='0%';
      text.textContent=G.cfg.timeLimit+'s';
      _pendingTimerPid = pid; _pendingTimerOnDone = onDone;
      _maybeSyncTimer(); // fires immediately if listener already received this turn
      return;
    }
    _startTimerWithRemaining(pid, G.cfg.timeLimit, onDone);
  }

  function stopTimer() {
    if (G&&G.timerInt) { clearInterval(G.timerInt); G.timerInt=null; }
    _pendingTimerPid=-1; _pendingTimerOnDone=null;
    for(var i=0;i<2;i++) $('timer'+i).classList.remove('active');
  }

  // ---- Init charts on load ----
  function initCharts() {
    buildChart(0);
    buildChart(1);
  }

  // ---- Public API ----
  // ---- Preflop range slots ----
  function buildRangeSlots() {
    for (var pid = 0; pid < 2; pid++) {
      var el = $('rs'+pid);
      if (!el) continue;
      var html = '<div class="rs-hdr">Preflop<br>Ranges</div>';
      for (var i = 0; i < 5; i++) {
        html += '<div class="rs-slot">' +
          '<div class="rs-name" id="rsn-'+pid+'-'+i+'" contenteditable="true" spellcheck="false">Slot '+(i+1)+'</div>' +
          '<button class="rs-btn rs-save" onclick="RP.saveRange('+pid+','+i+')">Save</button>' +
          '<button class="rs-btn rs-load" onclick="RP.loadRange('+pid+','+i+')">Load</button>' +
          '</div>';
      }
      html += '<div class="rs-io">' +
        '<button class="rs-io-btn" onclick="RP.exportSlots('+pid+')">Export</button>' +
        '<button class="rs-io-btn" onclick="RP.toggleImport('+pid+')">Import</button>' +
        '</div>' +
        '<div class="rs-import-area" id="rs-import-'+pid+'">' +
        '<textarea class="rs-import-ta" id="rs-import-ta-'+pid+'" placeholder="Paste export text here…"></textarea>' +
        '<button class="rs-import-apply" onclick="RP.importSlots('+pid+')">Apply</button>' +
        '<div class="rs-import-msg" id="rs-import-msg-'+pid+'"></div>' +
        '</div>';
      el.innerHTML = html;
    }
  }

  function updateSlotsDisabled() {
    var isPreflop = G && G.street === 'preflop';
    for (var pid = 0; pid < 2; pid++) {
      var el = $('rs'+pid);
      if (!el) continue;
      var active;
      if (onlineMode) {
        active = isPreflop && pid === myPid && G.actPid === myPid;
      } else {
        active = isPreflop && G.actPid === pid;
      }
      if (!isPreflop || (onlineMode && pid !== myPid)) {
        el.classList.add('pf-disabled');
        el.classList.remove('opp-view');
      } else if (active) {
        el.classList.remove('pf-disabled');
        el.classList.remove('opp-view');
      } else {
        el.classList.remove('pf-disabled');
        el.classList.add(onlineMode ? 'pf-disabled' : 'opp-view');
      }
    }
  }

  function saveRange(pid, i) {
    if (onlineMode && (pid !== myPid || G.actPid !== myPid)) return;
    if (!G || G.street !== 'preflop' || G.actPid !== pid) return;
    preflopSlots[pid][i] = {
      ranges: JSON.parse(JSON.stringify(G.ranges[pid])),
      betSz: parseFloat($('bet-inp').value) || null
    };
    var loadBtn = document.querySelector('#rs'+pid+' .rs-slot:nth-child('+(i+2)+') .rs-load');
    if (loadBtn) loadBtn.classList.add('has-data');
    setMsg('Range saved to slot '+(i+1)+'.');
  }

  function remapAction(action, facing) {
    if (facing) {
      if (action === 'check') return 'fold';
      if (action === 'bet') return 'raise';
      return action;
    } else {
      if (action === 'fold' || action === 'call') return 'check';
      if (action === 'raise') return 'bet';
      return action;
    }
  }

  function loadRange(pid, i) {
    if (onlineMode && (pid !== myPid || G.actPid !== myPid)) return;
    if (!G || G.street !== 'preflop') return;
    var slot = preflopSlots[pid][i];
    if (!slot) { setMsg('Slot '+(i+1)+' is empty.'); return; }
    var dest = G.actPid;
    var facing = isFacing(dest);
    var defAction = facing ? 'fold' : 'check';
    var savedRanges = slot.ranges;
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var curMap = G.ranges[dest][r][c];
        var savedMap = savedRanges[r] && savedRanges[r][c];
        for (var ck in curMap) {
          if (savedMap && (ck in savedMap)) {
            curMap[ck] = remapAction(savedMap[ck], facing);
          } else {
            curMap[ck] = defAction;
          }
        }
      }
    }
    if (slot.betSz) {
      var minRaiseTotal = G.curBetTo === 0 ? 1 : G.curBetTo + G.lastRaiseAmt;
      $('bet-inp').value = Math.max(slot.betSz, minRaiseTotal).toFixed(2);
    }
    colorChart(dest, true);
    updateRangeSum(dest);
    updateRangeDist(dest);
    setMsg('Slot '+(i+1)+' loaded.');
  }

  // ================================================================
  //  RANGE SLOT EXPORT / IMPORT
  // ================================================================

  var SLOT_ENC = {fold:'f', call:'c', check:'k', raise:'r', bet:'b'};
  var SLOT_DEC = {f:'fold', c:'call', k:'check', r:'raise', b:'bet'};

  function encodeNarrowed(set) {
    if (set === null) return null;
    var out = [];
    for (var r = 0; r < 13; r++) for (var c = 0; c < 13; c++) {
      var type = cellType(r, c);
      for (var suit of typeSuits(type)) out.push(set.has(htSuitKey(r,c,suit)) ? '1' : '0');
    }
    return out.join('');
  }

  function decodeNarrowed(str) {
    if (str === null) return null;
    var set = new Set(), idx = 0;
    for (var r = 0; r < 13; r++) for (var c = 0; c < 13; c++) {
      var type = cellType(r, c);
      for (var suit of typeSuits(type)) { if (str[idx] === '1') set.add(htSuitKey(r,c,suit)); idx++; }
    }
    return set;
  }

  function encodeSlotRanges(ranges) {
    var out = [];
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var type = cellType(r, c);
        var cell = ranges[r] && ranges[r][c];
        for (var suit of typeSuits(type)) {
          var ck = htSuitKey(r, c, suit);
          var a = cell && cell[ck];
          out.push(a ? (SLOT_ENC[a] || '.') : '.');
        }
      }
    }
    return out.join('');
  }

  function decodeSlotRanges(str) {
    var ranges = [];
    for (var r = 0; r < 13; r++) { ranges[r] = []; for (var c = 0; c < 13; c++) ranges[r][c] = {}; }
    var idx = 0;
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var type = cellType(r, c);
        for (var suit of typeSuits(type)) {
          var ck = htSuitKey(r, c, suit);
          var ch = str[idx++];
          if (ch && ch !== '.') ranges[r][c][ck] = SLOT_DEC[ch];
        }
      }
    }
    return ranges;
  }

  function exportSlots(pid) {
    var slots = preflopSlots[pid].map(function(slot, i) {
      if (!slot) return null;
      var name = ($('rsn-'+pid+'-'+i) || {}).textContent || ('Slot '+(i+1));
      return { name: name, r: encodeSlotRanges(slot.ranges), b: slot.betSz || null };
    });
    var text = JSON.stringify({ v: 1, slots: slots });
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('#rs'+pid+' .rs-io-btn');
      if (!btn) return;
      var orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = orig; }, 1500);
    }).catch(function() { setMsg('Copy failed — try a browser that supports clipboard access.'); });
  }

  function toggleImport(pid) {
    var area = $('rs-import-'+pid);
    if (!area) return;
    var isOpen = area.classList.toggle('open');
    if (isOpen) { var ta = $('rs-import-ta-'+pid); if (ta) { ta.value = ''; ta.focus(); } }
    var msg = $('rs-import-msg-'+pid);
    if (msg) msg.textContent = '';
  }

  function importSlots(pid) {
    var ta = $('rs-import-ta-'+pid);
    var msgEl = $('rs-import-msg-'+pid);
    var text = ta ? ta.value.trim() : '';
    function err(s) { if (msgEl) { msgEl.style.color = '#e74c3c'; msgEl.textContent = s; } }
    function ok(s)  { if (msgEl) { msgEl.style.color = '#2ecc71'; msgEl.textContent = s; } }
    if (!text) { err('Nothing pasted.'); return; }
    var data;
    try { data = JSON.parse(text); } catch(e) { err('Invalid text.'); return; }
    if (!data || data.v !== 1 || !Array.isArray(data.slots) || data.slots.length !== 5) {
      err('Unrecognised format.'); return;
    }
    var loaded = 0;
    data.slots.forEach(function(slot, i) {
      if (!slot) { preflopSlots[pid][i] = null; return; }
      if (typeof slot.r !== 'string' || slot.r.length !== 1326) { err('Slot '+(i+1)+' is corrupt.'); return; }
      preflopSlots[pid][i] = { ranges: decodeSlotRanges(slot.r), betSz: slot.b || null };
      var nameEl = $('rsn-'+pid+'-'+i);
      if (nameEl && slot.name) nameEl.textContent = slot.name;
      var loadBtn = document.querySelector('#rs'+pid+' .rs-slot:nth-child('+(i+2)+') .rs-load');
      if (loadBtn) loadBtn.classList.add('has-data');
      loaded++;
    });
    ok('Imported '+loaded+' slot'+(loaded===1?'':'s')+'.');
  }

  // ================================================================
  //  ONLINE MULTIPLAYER
  // ================================================================

  function generateRoomCode() {
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars
    var code = '';
    for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  }

  // ---- Lobby UI helpers ----
  function setSetupMode(mode) {
    $('local-card').style.display  = mode === 'local'  ? '' : 'none';
    $('online-card').style.display = mode === 'online' ? '' : 'none';
    $('tab-local').classList.toggle('active',  mode === 'local');
    $('tab-online').classList.toggle('active', mode === 'online');
  }

  function setOnlineSubMode(mode) {
    $('online-host-section').style.display = mode === 'host' ? '' : 'none';
    $('online-join-section').style.display = mode === 'join' ? '' : 'none';
    $('otab-host').classList.toggle('active', mode === 'host');
    $('otab-join').classList.toggle('active', mode === 'join');
  }

  // ---- Host a game ----
  function hostGame() {
    if (!db) { alert('Firebase is not configured.\nFill in FIREBASE_CONFIG in the source first.'); return; }
    var hostName   = $('cfg-host-name').value   || 'Player 1';
    var startStack = parseFloat($('cfg-online-stack').value) || 100;
    var timeLimit  = parseInt($('cfg-online-time').value)    || 120;
    var evSplit    = $('cfg-online-ev-split').checked;

    roomCode  = generateRoomCode();
    myPid     = 0;
    onlineMode = true;

    db.ref('rooms/'+roomCode).set({
      status: 'waiting',
      config: { p0name: hostName, startStack: startStack, timeLimit: timeLimit, evSplit: evSplit }
    });
    db.ref('rooms/'+roomCode).onDisconnect().remove();

    // Show room code and share link
    $('room-code-text').textContent = roomCode;
    $('host-settings').style.display = 'none';
    $('btn-create-room').style.display = 'none';
    $('host-waiting').style.display = '';
    var shareUrl = window.location.href.split('?')[0] + '?room=' + roomCode;
    $('host-share-url').textContent = '🔗 ' + shareUrl + '  (click to copy)';

    // Wait for guest to join
    _guestJoinRef = db.ref('rooms/'+roomCode+'/players/1');
    _guestJoinRef.on('value', function(snap) {
      var guest = snap.val();
      if (!guest) return;
      // Detach listener and mark room active so late joiners are rejected
      _guestJoinRef.off(); _guestJoinRef = null;
      db.ref('rooms/'+roomCode+'/status').set('active');
      // Guest has joined — start the game
      setupActionListener();
      setupPresence();
      setupPresenceListener(1);
      setupServerTimeOffset();
      setupTurnListener();
      $('setup-screen').style.display = 'none';
      $('game-screen').style.display  = 'flex';
      $('debug-btn').style.display = 'none';
      newMatch({ startStack: startStack, timeLimit: timeLimit, names: [hostName, guest.name], evSplit: evSplit });
    });
  }

  // ---- Join a game ----
  function joinGame() {
    if (!db) { alert('Firebase is not configured.\nFill in FIREBASE_CONFIG in the source first.'); return; }
    var code      = ($('cfg-room-code').value || '').toUpperCase().replace(/\s/g,'');
    var guestName = $('cfg-join-name').value || 'Player 2';

    if (code.length !== 6) { $('join-status').textContent = 'Enter the 6-character room code.'; return; }
    $('join-status').textContent = 'Connecting…';

    db.ref('rooms/'+code).once('value', function(snap) {
      var room = snap.val();
      if (!room || !room.config) { $('join-status').textContent = 'Room not found — check the code and try again.'; return; }
      var cfg = room.config;

      if (room.status === 'active') {
        var storedName = room.players && room.players[1] && room.players[1].name;
        if (guestName !== storedName) { $('join-status').textContent = 'Game already in progress.'; return; }
        var guestPresent = room.presence && room.presence[1];
        if (guestPresent) { $('join-status').textContent = 'Game already in progress.'; return; }
        // Same username and guest not currently connected — rejoin
        roomCode   = code;
        myPid      = 1;
        onlineMode = true;
        _isRejoin    = true;
        currentHandN = 0;   // reset so hand listener fires immediately
        _lastSyncedTurnId = 0; _lastTurnData = null; // reset so timer sync fires
        setupHandListener();
        setupActionListener();
        setupPresence();
        setupPresenceListener(0);
        setupServerTimeOffset();
        setupTurnListener();
        $('setup-screen').style.display = 'none';
        $('game-screen').style.display  = 'flex';
        $('debug-btn').style.display = 'none';
        newMatch({ startStack: cfg.startStack, timeLimit: cfg.timeLimit, names: [cfg.p0name, guestName], evSplit: !!cfg.evSplit });
        return;
      }

      roomCode   = code;
      myPid      = 1;
      onlineMode = true;

      // Register as guest
      db.ref('rooms/'+roomCode+'/players/1').set({ name: guestName });

      // Set up listeners before showing game screen
      setupHandListener();
      setupActionListener();
      setupPresence();
      setupPresenceListener(0);
      setupServerTimeOffset();
      setupTurnListener();

      $('setup-screen').style.display = 'none';
      $('game-screen').style.display  = 'flex';
      $('debug-btn').style.display = 'none';
      // newMatch creates G and calls dealHand(), which returns early for the guest
      newMatch({ startStack: cfg.startStack, timeLimit: cfg.timeLimit, names: [cfg.p0name, guestName], evSplit: !!cfg.evSplit });
    });
  }

  // ---- Firebase listeners ----
  function setupHandListener() {
    db.ref('rooms/'+roomCode+'/hand').on('value', function(snap) {
      var data = snap.val();
      if (!data || data.n === currentHandN) return;
      currentHandN  = data.n;
      actionSeenKey = '';
      onRemoteHand(data);
    });
  }

  function setupActionListener() {
    db.ref('rooms/'+roomCode+'/pendingAction').on('value', function(snap) {
      var data = snap.val();
      if (!data) return;
      if (data.handN !== currentHandN) return; // stale action from a previous hand
      var actionKey = data.pid + ':' + data.n;
      if (actionKey === actionSeenKey) return;  // already processed
      actionSeenKey = actionKey;
      if (data.pid === myPid) return;           // my own action, already executed locally
      enqueueRemoteAction(data);
    });
  }

  // ---- Server time sync & turn timer ----
  function setupServerTimeOffset() {
    db.ref('.info/serverTimeOffset').on('value', function(snap) {
      serverTimeOffset = snap.val() || 0;
    });
  }

  function setupTurnListener() {
    db.ref('rooms/'+roomCode+'/currentTurn').on('value', function(snap) {
      _lastTurnData = snap.val();
      _maybeSyncTimer();
    });
  }

  // ---- Presence / disconnect detection ----
  var _disconnectTimer = null;

  function setupPresence() {
    var presRef = db.ref('rooms/'+roomCode+'/presence/'+myPid);
    presRef.set(true);
    presRef.onDisconnect().remove();
    // Re-assert presence on reconnect (handles brief network drops)
    db.ref('.info/connected').on('value', function(snap) {
      if (snap.val()) { presRef.set(true); }
    });
  }

  function setupPresenceListener(oppPid) {
    db.ref('rooms/'+roomCode+'/presence/'+oppPid).on('value', function(snap) {
      var present = !!snap.val();
      if (!present) {
        if (!_disconnectTimer) {
          _disconnectTimer = setTimeout(function() {
            _disconnectTimer = null;
            if (G && G.cfg) $('pname'+oppPid).textContent = G.cfg.names[oppPid] + ' (disconnected)';
          }, 5000);
        }
      } else {
        if (_disconnectTimer) { clearTimeout(_disconnectTimer); _disconnectTimer = null; }
        if (G && G.cfg) $('pname'+oppPid).textContent = G.cfg.names[oppPid];
      }
    });
  }

  // ---- Silent replay helpers (used on rejoin to reconstruct mid-hand state) ----
  function silentCollectBets() {
    G.pot += G.bets[0] + G.bets[1];
    G.bets = [0, 0]; G.curBetTo = 0; G.lastRaiseAmt = 0;
  }

  function silentAdvanceStreet() {
    var order = ['preflop','flop','turn','river'];
    var idx = order.indexOf(G.street);
    silentCollectBets();
    if (idx >= 3) { G.handOver = true; return; }
    var next = order[idx + 1];
    if (next === 'flop') { G.board.push(G.deck.pop(), G.deck.pop(), G.deck.pop()); }
    else { G.board.push(G.deck.pop()); }
    G.street = next;
    G.streetChecked = [false, false]; G.streetActed = [false, false];
    G.actPid = 1 - G.dealer; // BB acts first postflop
  }

  function silentRunOutBoard() {
    while (G.board.length < 3) G.board.push(G.deck.pop());
    if (G.board.length < 4) G.board.push(G.deck.pop());
    if (G.board.length < 5) G.board.push(G.deck.pop());
    G.handOver = true;
  }

  function replayAction(data) {
    var pid = data.pid, action = data.action, betSz = data.betSz || 0, opp = 1 - pid;
    G.narrowed[pid] = decodeNarrowed(data.narrowed);
    G.streetActed[pid] = true;

    if (action === 'fold') {
      var pot = G.pot + G.bets[0] + G.bets[1];
      G.stacks[opp] += pot; G.pot = 0; G.bets = [0, 0];
      G.handOver = true; _replayFoldWinner = opp;
      return;
    }
    if (action === 'check') {
      G.streetChecked[pid] = true;
      if (G.street === 'preflop') {
        if (pid !== G.dealer) silentAdvanceStreet(); else G.actPid = opp;
      } else {
        if (G.streetChecked[opp]) silentAdvanceStreet(); else G.actPid = opp;
      }
      return;
    }
    if (action === 'call') {
      var toCall = Math.min(G.curBetTo - G.bets[pid], G.stacks[pid]);
      G.stacks[pid] -= toCall; G.bets[pid] += toCall;
      if (G.stacks[pid] === 0 || G.stacks[opp] === 0) {
        G.allIn = true; silentCollectBets(); silentRunOutBoard(); return;
      }
      if (G.street === 'preflop' && pid === G.dealer && G.lastRaiseAmt <= 1 && !G.streetActed[opp]) {
        G.actPid = opp; return; // limp — BB gets option
      }
      silentAdvanceStreet(); return;
    }
    if (action === 'bet' || action === 'raise') {
      var myBet = G.bets[pid], myStack = G.stacks[pid];
      var effectiveMax = Math.min(myBet + myStack, G.bets[opp] + G.stacks[opp]);
      var minTotal = G.curBetTo === 0 ? Math.max(1, betSz) : G.curBetTo + G.lastRaiseAmt;
      var totalBet = Math.max(Math.min(betSz, effectiveMax), Math.min(minTotal, effectiveMax));
      var paid = Math.min(totalBet - myBet, myStack);
      G.stacks[pid] -= paid; G.bets[pid] += paid;
      var raiseAmt = G.bets[pid] - G.curBetTo;
      G.lastRaiseAmt = Math.max(raiseAmt, G.lastRaiseAmt);
      G.curBetTo = G.bets[pid];
      if (G.stacks[pid] === 0) G.allIn = true;
      G.actPid = opp;
      return;
    }
  }

  // ---- Apply hand state received from host ----
  function onRemoteHand(data) {
    remoteActionQueue      = [];
    processingRemoteAction = false;
    G.deck         = data.deck;
    G.hole         = [data.hole0, data.hole1];
    G.dealer       = data.dealer;
    G.stacks       = [data.stacks0, data.stacks1];
    G.handNum      = data.n;
    G.handOver     = false;
    G.allIn        = false;
    G.bets         = [0, 0];
    G.pot          = 0;
    G.curBetTo     = 0;
    G.lastRaiseAmt = 0;
    G.narrowed     = [null, null];
    G.draft        = [null, null];
    G.draftBetSz   = [null, null];
    G.pendingAction = null;

    $('next-btn').style.display = 'none';
    buildChart(0); buildChart(1);

    if (_isRejoin) {
      _isRejoin = false;
      _replayFoldWinner = -1;
      _replayingActions = true; // block pendingAction listener until replay is done
      // Set up initial hand state (mirrors startHandUI without startTurn)
      G.board = [];
      renderHole(0, debugMode); renderHole(1, debugMode);
      renderBoard(); $('log').innerHTML = ''; updateUI();
      postBlinds();
      G.narrowed = [null, null];
      initRange(0); initRange(1);
      G.street = 'preflop';
      G.streetChecked = [false, false]; G.streetActed = [false, false];
      G.actPid = G.dealer;
      // Fetch action log and replay silently
      db.ref('rooms/'+roomCode+'/actions').once('value', function(snap) {
        var acts = [];
        if (snap.val()) snap.forEach(function(c) { acts.push(c.val()); });
        // Sort by log key (numeric), not by per-player n, to get correct order
        acts.sort(function(a, b) { return a._seq - b._seq; });
        acts.forEach(replayAction);
        // Sync dedup key to last replayed action so pendingAction doesn't replay it
        if (acts.length > 0) {
          var last = acts[acts.length - 1];
          actionSeenKey = last.pid + ':' + last.n;
        }
        _replayingActions = false;
        renderBoard(null);
        colorChart(0, false); colorChart(1, false);
        updateRangeSum(0); updateRangeSum(1); updateUI();
        if (G.handOver) {
          if (G.allIn) { renderHole(0,true); renderHole(1,true); showdown(); }
          else { endHand(_replayFoldWinner, 'fold'); }
        } else {
          startTurn(G.actPid);
        }
      });
      return;
    }

    startHandUI();
  }

  // ---- Remote action queue (prevents race when two actions arrive before the first executes) ----
  function enqueueRemoteAction(data) {
    if (_replayingActions) return; // action log replay handles past actions on rejoin
    remoteActionQueue.push(data);
    if (!processingRemoteAction) processNextRemoteAction();
  }

  function processNextRemoteAction() {
    if (remoteActionQueue.length === 0) { processingRemoteAction = false; return; }
    processingRemoteAction = true;
    var data = remoteActionQueue.shift();
    var pid = data.pid;
    G.narrowed[pid] = decodeNarrowed(data.narrowed);
    colorChart(pid, false);
    updateRangeSum(pid);
    var sfx = data.betSz && (data.action==='bet'||data.action==='raise') ? ' '+fmt(data.betSz) : '';
    addLog(G.cfg.names[pid]+' ('+G.street+'): '+data.action+sfx, 'log-'+data.action);
    setMsg(G.cfg.names[pid]+' → '+data.action+sfx);
    // Wait for render, then execute the action; afterwards allow 400ms for
    // execAction's internal startTurn setTimeout (300ms) to settle before
    // processing the next queued action.
    setTimeout(function() {
      execAction(pid, data.action, data.betSz || 0);
      // Host logs the opponent's action so the action log has a single authoritative
      // sequence written by one client (avoids key collisions from both sides writing).
      if (myPid === 0) {
        var seq = ++hostLogSeqNum;
        data._seq = seq;
        db.ref('rooms/'+roomCode+'/actions/'+seq).set(data);
      }
      setTimeout(processNextRemoteAction, 400);
    }, 350);
  }

  // ---- Write hand state to Firebase (host only) ----
  function writeHandToFirebase() {
    handSeqNum++;
    currentHandN  = handSeqNum;
    actionSeqNum  = 0;
    hostLogSeqNum = 0;
    actionSeenKey = '';
    db.ref('rooms/'+roomCode+'/actions').remove();
    db.ref('rooms/'+roomCode+'/hand').set({
      n:       handSeqNum,
      dealer:  G.dealer,
      deck:    G.deck,
      hole0:   G.hole[0],
      hole1:   G.hole[1],
      stacks0: G.stacks[0],
      stacks1: G.stacks[1]
    });
  }

  // ---- Write action to Firebase (active player) ----
  function writeActionToFirebase(pid, action, betSz, narrowed) {
    actionSeqNum++;
    var entry = {
      handN:    currentHandN,
      n:        actionSeqNum,
      pid:      pid,
      action:   action,
      betSz:    betSz || 0,
      narrowed: encodeNarrowed(narrowed)
    };
    db.ref('rooms/'+roomCode+'/pendingAction').set(entry);
    // Only host writes to the action log so there are no key collisions.
    // Guest actions are logged by the host in processNextRemoteAction.
    if (myPid === 0) {
      var seq = ++hostLogSeqNum;
      entry._seq = seq;
      db.ref('rooms/'+roomCode+'/actions/'+seq).set(entry);
    }
  }

  // ---- Copy share URL to clipboard ----
  function copyShareUrl() {
    var url = window.location.href.split('?')[0] + '?room=' + roomCode;
    navigator.clipboard.writeText(url).then(function() {
      $('host-share-url').textContent = '✓ Copied to clipboard!';
      setTimeout(function() {
        $('host-share-url').textContent = '🔗 ' + url + '  (click to copy)';
      }, 2500);
    });
  }

  // ================================================================

  return {
    startGame: startGame,
    openSettings: openSettings,
    saveDraft: saveDraft,
    undoLast: undoLast,
    foldEarly: foldEarly,
    submit: function(){ submit(false); },
    nextHand: nextHand,
    closeShowdown: closeShowdown,
    toggleDebug: toggleDebug,
    toggleSF: toggleSF,
    toggleHT: toggleHT,
    toggleRandomize: toggleRandomize,
    randomizeRange: randomizeRange,
    cancelRoom: cancelRoom,
    deselectAll: deselectAll,
    toggleSelectAll: toggleSelectAll,
    setSelMode: setSelMode,
    setBarView: setBarView,
    toggleStrengthEnlarge: toggleStrengthEnlarge,
    _initCharts: initCharts,
    _buildSuitFilter: buildSuitFilterUI,
    _buildRangeSlots: buildRangeSlots,
    saveRange: saveRange,
    loadRange: loadRange,
    exportSlots: exportSlots,
    toggleImport: toggleImport,
    importSlots: importSlots,
    setSetupMode: setSetupMode,
    setOnlineSubMode: setOnlineSubMode,
    hostGame: hostGame,
    joinGame: joinGame,
    copyShareUrl: copyShareUrl
  };
})();

// Init charts on page load
document.addEventListener('DOMContentLoaded', function(){
  RP._initCharts();
  RP._buildSuitFilter();
  RP._buildRangeSlots();
  var betInp = document.getElementById('bet-inp');
  betInp.addEventListener('change', function() {
    var val = parseFloat(this.value);
    var min = parseFloat(this.min);
    var max = parseFloat(this.max);
    if (min && val < min) this.value = min.toFixed(2);
    else if (max && val > max) this.value = max.toFixed(2);
  });

  // If URL contains ?room=CODE, switch straight to the join screen
  var urlParams = new URLSearchParams(window.location.search);
  var roomParam = urlParams.get('room');
  if (roomParam) {
    RP.setSetupMode('online');
    RP.setOnlineSubMode('join');
    document.getElementById('cfg-room-code').value = roomParam.toUpperCase();
  }
});
</script>
<div id="strength-popup">
  <div class="strength-bar" id="sbar0-lg"></div>
  <div class="strength-bar" id="sbar1-lg"></div>
</div>
</body>
