<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Range Poker - Heads Up NLHE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
}

/* ===== SETUP SCREEN ===== */
#setup-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 18px;
}
#setup-screen h1 {
  font-size: 2.4em;
  color: #f0c040;
  text-shadow: 0 0 20px rgba(240,192,64,0.4);
}
.setup-card {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 12px;
  padding: 28px 36px;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.setup-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.setup-row label { color: #aaa; }
.setup-row input {
  background: #0f3460;
  border: 1px solid #1a5276;
  border-radius: 6px;
  color: #fff;
  padding: 5px 10px;
  width: 110px;
  font-size: 0.95em;
  text-align: center;
}
.btn-start {
  background: linear-gradient(135deg, #f0c040, #e67e22);
  color: #111;
  border: none;
  border-radius: 8px;
  padding: 11px 24px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.btn-start:hover { filter: brightness(1.1); }

/* ===== GAME SCREEN ===== */
#game-screen {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  padding: 6px;
  gap: 6px;
}

/* Top bar */
#top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 12px;
  background: #16213e;
  border-radius: 8px;
  font-size: 0.82em;
  color: #aaa;
}
.stack-info { color: #f0c040; font-weight: 700; }
.btn-small {
  background: #0f3460;
  border: 1px solid #1a5276;
  color: #aaa;
  border-radius: 5px;
  padding: 3px 9px;
  cursor: pointer;
  font-size: 0.82em;
}
.btn-small:hover { background: #1a5276; }

/* Message banner */
#msg-banner {
  background: #0d1a30;
  border: 1px solid #1a3a5a;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 0.82em;
  color: #7fb3d3;
  text-align: center;
  min-height: 26px;
}

/* Main 3-column layout */
#main-area {
  display: grid;
  grid-template-columns: auto 1fr 200px 1fr auto;
  gap: 8px;
  align-items: start;
}

/* Player panel */
.player-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.player-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.15em;
  font-weight: 700;
  color: #ddd;
}
.dealer-btn {
  background: #f0c040;
  color: #111;
  border-radius: 50%;
  width: 17px; height: 17px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 0.65em;
  font-weight: 800;
}
.dealer-btn.show { display: inline-flex; }
.pos-badge {
  background: #0f3460;
  color: #7fb3d3;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 0.72em;
}

/* Timer */
.timer-row {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  visibility: hidden;
}
.timer-row.active { visibility: visible; }
.timer-text { font-size: 0.78em; color: #f39c12; width: 24px; }
.timer-bar { flex: 1; height: 5px; background: #0f3460; border-radius: 3px; overflow: hidden; }
.timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #27ae60, #f39c12, #e74c3c); border-radius: 3px; }

/* Hand chart */
.hand-chart {
  display: grid;
  grid-template-columns: repeat(13, 30px);
  grid-template-rows: repeat(13, 42px);
  gap: 1px;
  background: #0a0a15;
  border: 1px solid #0f3460;
  border-radius: 3px;
  padding: 1px;
  cursor: crosshair;
  user-select: none;
}
.hc {
  width: 30px; height: 42px;
  display: flex;
  flex-direction: column;
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  cursor: crosshair;
}
.hc-label {
  height: 11px;
  flex-shrink: 0;
  background: #0f0f1e;
  color: #777;
  font-size: 6.5px;
  font-weight: 700;
  text-align: center;
  line-height: 11px;
  pointer-events: none;
}
.hc-suits { flex: 1; display: grid; min-height: 0; }
.hcs-suited  { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.hcs-offsuit { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; }
.hcs-pair    { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
.hc-suit { background: #0a0a15; }
.hc.drag-sel { outline: 2px solid rgba(255,255,255,0.85); outline-offset: -1px; z-index: 3; }

/* Suit filter panel */
#suit-filter { border-top: 1px solid #1a3a5a; margin-top: 3px; padding-top: 3px; }
.sf-toggle { background:none; border:none; color:#7fb3d3; font-size:0.73em; cursor:pointer; width:100%; text-align:left; padding:2px 0; }
.sf-toggle:hover { color:#bbb; }
#hand-types { border-top: 1px solid #1a3a5a; margin-top: 3px; padding-top: 3px; }
#ht-toggle-btn { background:none; border:none; color:#7fb3d3; font-size:0.73em; cursor:pointer; width:100%; text-align:left; padding:2px 0; }
#ht-toggle-btn:hover { color:#bbb; }
#ht-body { margin-top:4px; display:flex; flex-wrap:wrap; gap:3px; }
.ht-btn { background:#0f2a3a; border:1px solid #1a4a6a; color:#9cc; font-size:0.63em; border-radius:3px; padding:2px 5px; cursor:pointer; white-space:nowrap; }
.ht-btn:hover { background:#1a3a50; color:#eff; }
#sf-body { margin-top:4px; display:flex; flex-direction:column; gap:5px; }
.sf-section { display:flex; flex-direction:column; gap:2px; }
.sf-sec-hdr { display:flex; align-items:center; justify-content:space-between; font-size:0.65em; color:#555; }
.sf-sec-hdr button { background:none; border:none; color:#444; font-size:0.85em; cursor:pointer; padding:0 2px; }
.sf-sec-hdr button:hover { color:#888; }
.sf-grid { display:grid; gap:2px; }
.sf-btn { background:#0f3460; border:1px solid #1a5276; border-radius:2px; font-size:0.68em; padding:2px 1px; cursor:pointer; text-align:center; line-height:1.2; }
.sf-btn.off { background:#0a0f1a; border-color:#111; opacity:0.35; }
.sf-btn:hover { filter:brightness(1.3); }

/* Range summary */
.range-sum {
  font-size: 0.7em;
  color: #555;
  text-align: center;
  min-height: 13px;
}

/* Hole cards */
.hole-cards {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.card {
  width: 38px; height: 54px;
  background: #fff;
  border-radius: 5px;
  border: 1px solid #bbb;
  display: flex; align-items: center; justify-content: center;
  font-size: 1em; font-weight: 800;
  box-shadow: 0 2px 6px rgba(0,0,0,0.6);
  flex-shrink: 0;
}
.card.down {
  background: repeating-linear-gradient(45deg, #1a3a6b, #1a3a6b 4px, #0f2848 4px, #0f2848 8px);
  border-color: #0a1e3a;
}
.card.red { color: #c0392b; }
.card.black { color: #111; }

.bet-disp { font-size: 1.1em; font-weight: 700; color: #f0c040; position: absolute; top: 50%; transform: translateY(-50%); white-space: nowrap; }
#bdisp0 { left: calc(100% + 8px); }
#bdisp1 { right: calc(100% + 8px); }
.stack-disp { font-size: 1.05em; font-weight: 600; color: #f0c040; text-align: center; min-height: 14px; }
.hole-area { position: relative; display: inline-block; }
.waiting { font-size: 0.72em; color: #444; font-style: italic; text-align: center; min-height: 14px; }

/* Center column */
#center-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding-top: 46px;
  position: relative;
}
#board-section {
  position: absolute;
  top: 554px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
}
#pot-disp {
  font-size: 1.3em;
  font-weight: 700;
  color: #f0c040;
}
#community-cards {
  display: flex;
  gap: 4px;
}
.cc-slot {
  width: 38px; height: 54px;
  border: 1px dashed #1a3a5a;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.cc-slot .card { width: 36px; height: 52px; font-size: 0.95em; border: none; box-shadow: none; }

/* Action panel */
#action-panel {
  background: #12192e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  width: 100%;
}
#action-panel.hidden { display: none; }
#action-prompt { font-size: 0.78em; color: #888; text-align: center; }

.action-btns {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}
.aBtn {
  border: none;
  border-radius: 5px;
  padding: 6px 12px;
  font-size: 0.8em;
  font-weight: 700;
  cursor: pointer;
}
.aBtn:hover { filter: brightness(1.15); }
.aBtn-check, .aBtn-call { background: #1e8449; color: #fff; }
.aBtn-bet, .aBtn-raise { background: #922b21; color: #fff; }
.aBtn-fold { background: #1a5276; color: #fff; }

#sel-mode-row { display: flex; justify-content: center; gap: 0; }
.sel-mode-btn {
  background: #0f3460;
  border: 1px solid #1a5276;
  color: #666;
  padding: 3px 10px;
  font-size: 0.72em;
  cursor: pointer;
}
.sel-mode-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.sel-mode-btn:last-child  { border-radius: 0 4px 4px 0; }
.sel-mode-btn.active { background: #1a5276; color: #ccc; }
#sel-all-btn { border-left: none; box-sizing: border-box; width: 60px; height: 43px; flex-shrink: 0; }

#range-dist { font-size: 0.72em; color: #aaa; text-align: center; line-height: 1.4; }
#range-dist-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 2px; }
#range-dist-bar span { display: block; transition: width 0.15s; }

.range-slots { display: flex; flex-direction: column; gap: 3px; width: 68px; flex-shrink: 0; padding-top: 2px; }
.rs-hdr { font-size: 0.6em; color: #445; text-align: center; line-height: 1.3; margin-bottom: 1px; letter-spacing: 0.02em; }
.rs-slot { display: flex; flex-direction: column; align-items: stretch; gap: 2px; padding: 3px 3px 4px; background: #0d1520; border: 1px solid #1a3a5a; border-radius: 4px; }
.rs-name { font-size: 0.62em; color: #7a8a9a; text-align: center; cursor: text; outline: none; padding: 1px 2px; border-radius: 2px; word-break: break-word; min-height: 1.1em; }
.rs-name:focus { background: #162540; color: #ddd; }
.rs-btn { font-size: 0.62em; padding: 2px 0; border: none; border-radius: 3px; cursor: pointer; color: #ccc; background: #1a3a5a; width: 100%; }
.rs-btn:hover { filter: brightness(1.3); }
.rs-btn.rs-save { background: #145a32; }
.rs-btn.rs-load.has-data { background: #7d3c98; }
.range-slots.pf-disabled { opacity: 0.3; pointer-events: none; }

.bet-row {
  display: none;
  align-items: center;
  gap: 5px;
  font-size: 0.8em;
  color: #888;
  justify-content: center;
}
.bet-row input {
  background: #0f3460;
  border: 1px solid #1a5276;
  border-radius: 4px;
  color: #fff;
  padding: 3px 7px;
  width: 64px;
  font-size: 0.88em;
  text-align: center;
}
.presets {
  display: none;
  flex-wrap: wrap;
  gap: 3px;
  justify-content: center;
}
.preset {
  background: #0f3460;
  border: 1px solid #1a5276;
  color: #7fb3d3;
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 0.72em;
  cursor: pointer;
}
.preset:hover { background: #1a5276; }
.preset:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

.submit-row {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.btn-submit {
  background: linear-gradient(135deg, #f0c040, #e67e22);
  color: #111;
  border: none;
  border-radius: 5px;
  padding: 6px 18px;
  font-size: 0.85em;
  font-weight: 700;
  cursor: pointer;
}
.btn-submit:hover { filter: brightness(1.1); }
.btn-draft {
  background: #0f3460;
  border: 1px solid #1a5276;
  color: #7fb3d3;
  border-radius: 5px;
  padding: 6px 10px;
  font-size: 0.78em;
  cursor: pointer;
}
.btn-draft:hover { background: #1a5276; }

/* Log */
#log {
  background: #0a0f1a;
  border: 1px solid #1a2a3a;
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 0.72em;
  color: #555;
  max-height: 70px;
  overflow-y: auto;
  width: 100%;
}
.log-line { margin-bottom: 1px; }
.log-line.hi { color: #f0c040; }

#next-btn {
  display: none;
  background: linear-gradient(135deg, #1e8449, #145a32);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 22px;
  font-size: 0.9em;
  font-weight: 700;
  cursor: pointer;
}
#next-btn:hover { filter: brightness(1.1); }


/* Showdown overlay */
#showdown-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
#showdown-overlay.show { display: flex; }
#showdown-box {
  background: #16213e;
  border: 2px solid #f0c040;
  border-radius: 12px;
  padding: 28px 36px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 300px;
}
#sd-title { color: #f0c040; font-size: 1.5em; font-weight: 700; }
.sd-hand { color: #aaa; font-size: 0.88em; }
.sd-cards { display: flex; gap: 4px; justify-content: center; }
.sd-cards .card { width: 34px; height: 48px; font-size: 0.88em; }
#sd-pot { color: #27ae60; font-size: 1.1em; font-weight: 700; }
.btn-continue {
  background: linear-gradient(135deg, #f0c040, #e67e22);
  color: #111;
  border: none;
  border-radius: 6px;
  padding: 10px 24px;
  font-size: 0.9em;
  font-weight: 700;
  cursor: pointer;
}
.btn-continue:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <h1>♠ Range Poker ♥</h1>
  <p style="color:#666;font-size:0.85em;">Heads-Up No-Limit Texas Hold'em</p>
  <div class="setup-card">
    <div class="setup-row">
      <label>Starting Stack (bb)</label>
      <input type="number" id="cfg-stack" value="100" min="10" max="1000" step="10">
    </div>
    <div class="setup-row">
      <label>Time per Turn (sec)</label>
      <input type="number" id="cfg-time" value="120" min="5" max="300" step="5">
    </div>
    <div class="setup-row">
      <label>Player 1 Name</label>
      <input type="text" id="cfg-p1" value="Player 1" style="text-align:left;">
    </div>
    <div class="setup-row">
      <label>Player 2 Name</label>
      <input type="text" id="cfg-p2" value="Player 2" style="text-align:left;">
    </div>
    <button class="btn-start" onclick="RP.startGame()">Start Game</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="top-bar">
    <span id="tb-hand" style="color:#555;">Hand #1</span>
    <button class="btn-small" onclick="RP.openSettings()">⚙ Settings</button>
  </div>

  <div id="msg-banner">Welcome</div>

  <div id="main-area">
    <!-- P1 range slots (col 1) -->
    <div class="range-slots pf-disabled" id="rs0"></div>

    <!-- P1 panel (col 2) -->
    <div class="player-panel" id="pp0">
      <div class="player-label">
        <span id="pname0">Player 1</span>
        <span class="dealer-btn" id="dbtn0">D</span>
        <span class="pos-badge" id="pos0">SB</span>
      </div>
      <div class="timer-row" id="timer0">
        <span class="timer-text" id="ttext0">20s</span>
        <div class="timer-bar"><div class="timer-fill" id="tfill0"></div></div>
      </div>
      <div class="hand-chart" id="chart0"></div>
      <div class="range-sum" id="rsum0"></div>
      <div class="hole-area">
        <div class="hole-cards" id="hc0"></div>
        <div class="bet-disp" id="bdisp0"></div>
      </div>
      <div class="stack-disp" id="sdisp0"></div>
      <div class="waiting" id="wait0"></div>
    </div>

    <!-- CENTER (col 3) -->
    <div id="center-col">
      <div id="action-panel">
        <div id="action-prompt">Select hands then click action</div>
        <div id="sel-mode-row">
          <button class="sel-mode-btn active" id="mode-rect" onclick="RP.setSelMode('rect')">▭ Rectangle</button>
          <button class="sel-mode-btn" id="mode-free" onclick="RP.setSelMode('free')">✏ Freehand</button>
          <button class="sel-mode-btn" id="sel-all-btn" onclick="RP.toggleSelectAll()">+<br>Select All</button>
        </div>
        <div id="range-dist"></div>
        <div id="range-dist-bar"></div>
        <div class="action-btns" id="abtns"></div>
        <div class="bet-row" id="bet-row">
          <span>Size:</span>
          <input type="number" id="bet-inp" min="0.5" step="0.5" value="2">
          <span>bb</span>
        </div>
        <div class="presets" id="presets"></div>
        <div id="suit-filter">
          <button class="sf-toggle" id="sf-toggle-btn" onclick="RP.toggleSF()">▸ Suit Filter</button>
          <div id="sf-body" style="display:none"></div>
        </div>
        <div id="hand-types">
          <button id="ht-toggle-btn" onclick="RP.toggleHT()">▸ Hand Types</button>
          <div id="ht-body" style="display:none"></div>
        </div>
        <div class="submit-row">
          <button class="btn-draft" onclick="RP.saveDraft()">Save Draft</button>
          <button class="btn-submit" onclick="RP.submit()">Submit</button>
        </div>
      </div>

      <div id="log"></div>
      <button id="next-btn" onclick="RP.nextHand()">Next Hand</button>
      <button id="debug-btn" onclick="RP.toggleDebug()" style="background:#0f3460;border:1px solid #1a5276;color:#555;border-radius:5px;padding:4px 10px;font-size:0.72em;cursor:pointer;margin-top:2px;">🔍 Debug: Off</button>

      <div id="board-section">
        <div id="community-cards">
          <div class="cc-slot" id="cc0"></div>
          <div class="cc-slot" id="cc1"></div>
          <div class="cc-slot" id="cc2"></div>
          <div class="cc-slot" id="cc3"></div>
          <div class="cc-slot" id="cc4"></div>
        </div>
        <div id="pot-disp">Pot: 0bb</div>
      </div>
    </div>

    <!-- P2 panel (col 4) -->
    <div class="player-panel" id="pp1">
      <div class="player-label">
        <span id="pname1">Player 2</span>
        <span class="dealer-btn" id="dbtn1">D</span>
        <span class="pos-badge" id="pos1">BB</span>
      </div>
      <div class="timer-row" id="timer1">
        <span class="timer-text" id="ttext1">20s</span>
        <div class="timer-bar"><div class="timer-fill" id="tfill1"></div></div>
      </div>
      <div class="hand-chart" id="chart1"></div>
      <div class="range-sum" id="rsum1"></div>
      <div class="hole-area">
        <div class="bet-disp" id="bdisp1"></div>
        <div class="hole-cards" id="hc1"></div>
      </div>
      <div class="stack-disp" id="sdisp1"></div>
      <div class="waiting" id="wait1"></div>
    </div>

    <!-- P2 range slots (col 5) -->
    <div class="range-slots pf-disabled" id="rs1"></div>
  </div>
</div>


<!-- SHOWDOWN OVERLAY -->
<div id="showdown-overlay">
  <div id="showdown-box">
    <div id="sd-title">Showdown</div>
    <div class="sd-hand" id="sd-h0"></div>
    <div class="sd-cards" id="sd-c0"></div>
    <div class="sd-hand" id="sd-h1"></div>
    <div class="sd-cards" id="sd-c1"></div>
    <div id="sd-pot"></div>
    <button class="btn-continue" onclick="RP.closeShowdown()">Continue</button>
  </div>
</div>

<script>
// ============================================================
//  RANGE POKER — single-file vanilla JS
// ============================================================
var RP = (function() {
  'use strict';

  // ---- Constants ----
  var RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  var SUITS = ['s','h','d','c'];
  var SYM   = {s:'♠', h:'♥', d:'♦', c:'♣'};
  var CLR   = {s:'black', h:'red', d:'red', c:'black'};
  var RVAL  = {A:14,K:13,Q:12,J:11,T:10,9:9,8:8,7:7,6:6,5:5,4:4,3:3,2:2};
  var SCLR  = {s:'#9ab',h:'#e74c3c',d:'#e74c3c',c:'#9ab'};

  var SUITED_SUITS  = ['ss','hh','dd','cc'];
  var OFFSUIT_SUITS = ['sh','sd','sc','hs','hd','hc','ds','dh','dc','cs','ch','cd'];
  var PAIR_SUITS    = ['sh','sd','sc','hd','hc','dc'];

  var suitFilter = {
    suited:  new Set(SUITED_SUITS),
    offsuit: new Set(OFFSUIT_SUITS),
    pair:    new Set(PAIR_SUITS)
  };

  function cellType(r,c){ return r===c?'pair':r<c?'suited':'offsuit'; }
  function typeSuits(t){ return t==='suited'?SUITED_SUITS:t==='pair'?PAIR_SUITS:OFFSUIT_SUITS; }

  function htSuitKey(r,c,suit) {
    var s1=suit[0],s2=suit[1];
    if(r===c) return cKey(RANKS[r]+s1, RANKS[r]+s2);
    if(r<c)   return cKey(RANKS[r]+s1, RANKS[c]+s1); // suited: both same suit
    return cKey(RANKS[c]+s1, RANKS[r]+s2); // offsuit: RANKS[c] is higher rank
  }

  function actionColor(action) {
    if(action==='check'||action==='call') return '#145a32';
    if(action==='bet'  ||action==='raise') return '#6e1515';
    if(action==='fold') return '#1a3a6b';
    return '#1a1a2e';
  }

  function suitSymHtml(suit) {
    return '<span style="color:'+SCLR[suit[0]]+'">'+SYM[suit[0]]+'</span>'+
           '<span style="color:'+SCLR[suit[1]]+'">'+SYM[suit[1]]+'</span>';
  }

  // ---- Game State ----
  var G = null;

  // ---- Deck helpers ----
  function buildDeck() {
    var d = [];
    for (var r of RANKS) for (var s of SUITS) d.push(r+s);
    return d;
  }
  function shuffle(a) {
    for (var i = a.length-1; i > 0; i--) {
      var j = (Math.random()*(i+1))|0;
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function cRank(c) { return c[0]; }
  function cSuit(c) { return c[1]; }
  function cDisp(c) { return cRank(c)+SYM[cSuit(c)]; }
  function cColor(c) { return CLR[cSuit(c)]; }

  // ---- Hand type helpers ----
  function handType(c1, c2) {
    var r1=cRank(c1), r2=cRank(c2), s1=cSuit(c1), s2=cSuit(c2);
    if (r1===r2) return r1+r2;
    var i1=RANKS.indexOf(r1), i2=RANKS.indexOf(r2);
    var hi = i1<i2 ? r1 : r2, lo = i1<i2 ? r2 : r1;
    return hi+lo+(s1===s2?'s':'o');
  }

  function htCell(ht) {
    // Returns {r,c} in 13x13 grid
    if (ht.length===2) { var x=RANKS.indexOf(ht[0]); return {r:x,c:x}; }
    var i1=RANKS.indexOf(ht[0]), i2=RANKS.indexOf(ht[1]);
    if (ht[2]==='s') return {r:i1,c:i2}; // suited: row<col (i1<i2)
    return {r:i2,c:i1}; // offsuit: row>col
  }

  function cellHT(r,c) {
    if (r===c) return RANKS[r]+RANKS[c];
    if (r<c) return RANKS[r]+RANKS[c]+'s';
    return RANKS[c]+RANKS[r]+'o';
  }

  function combosFor(ht) {
    // Returns array of canonical combo strings "RsRs"
    var combos = [];
    if (ht.length===2) {
      var rk = ht[0];
      for (var i=0;i<4;i++) for (var j=i+1;j<4;j++)
        combos.push(rk+SUITS[i]+rk+SUITS[j]);
    } else {
      var r1=ht[0], r2=ht[1], suited=ht[2]==='s';
      if (suited) {
        for (var s of SUITS) combos.push(r1+s+r2+s);
      } else {
        for (var s1 of SUITS) for (var s2 of SUITS)
          if (s1!==s2) combos.push(r1+s1+r2+s2);
      }
    }
    return combos;
  }

  function cKey(c1,c2) {
    // Canonical combo key: sort by rank-idx then suit
    var k1=RANKS.indexOf(cRank(c1))*4+SUITS.indexOf(cSuit(c1));
    var k2=RANKS.indexOf(cRank(c2))*4+SUITS.indexOf(cSuit(c2));
    return k1<=k2 ? c1+c2 : c2+c1;
  }

  // ---- Hand Evaluator ----
  function evalHand(cards) {
    if (cards.length===5) return eval5(cards);
    var best=null;
    var n=cards.length; // 6 (turn) or 7 (river) — pick best 5
    var skip = n===7 ? 2 : 1;
    function iter(start, excluded) {
      if (excluded.length===skip) {
        var five=cards.filter((_,k)=>!excluded.includes(k));
        var v=eval5(five);
        if (!best||v.rank>best.rank) best=v;
        return;
      }
      for (var i=start;i<n;i++) { excluded.push(i); iter(i+1,excluded); excluded.pop(); }
    }
    iter(0,[]);
    return best;
  }

  function eval5(cards) {
    var rv=cards.map(c=>RVAL[cRank(c)]).sort((a,b)=>b-a);
    var sv=cards.map(c=>cSuit(c));
    var flush=sv.every(s=>s===sv[0]);

    // Straight detection
    var uniq=[...new Set(rv)].sort((a,b)=>b-a);
    var str=false, strHi=0;
    for (var i=0;i<=uniq.length-5;i++) {
      if (uniq[i]-uniq[i+4]===4 && uniq.slice(i,i+5).length===5) {
        str=true; strHi=uniq[i]; break;
      }
    }
    // Wheel A2345
    if (!str&&uniq.includes(14)&&uniq.includes(2)&&uniq.includes(3)&&uniq.includes(4)&&uniq.includes(5)) {
      str=true; strHi=5;
    }

    // Count groups
    var cnt={};
    rv.forEach(r=>cnt[r]=(cnt[r]||0)+1);
    var grp=Object.entries(cnt).map(([r,c])=>({r:+r,c})).sort((a,b)=>b.c-a.c||b.r-a.r);

    if (str&&flush) {
      return {rank:8e8+strHi, desc: strHi===14?'Royal Flush':'Straight Flush, '+rname(strHi)+' high'};
    }
    if (grp[0].c===4) {
      return {rank:7e8+grp[0].r*100+grp[1].r, desc:'Four of a Kind, '+pluralRank(grp[0].r)};
    }
    if (grp[0].c===3&&grp[1]&&grp[1].c>=2) {
      return {rank:6e8+grp[0].r*100+grp[1].r, desc:'Full House, '+pluralRank(grp[0].r)+' full of '+pluralRank(grp[1].r)};
    }
    if (flush) {
      var v=rv.reduce((a,r,i)=>a+r*Math.pow(15,4-i),0);
      return {rank:5e8+v, desc:'Flush, '+rname(rv[0])+' high'};
    }
    if (str) {
      return {rank:4e8+strHi, desc:'Straight, '+rname(strHi)+' high'};
    }
    if (grp[0].c===3) {
      var ks=grp.slice(1).map(g=>g.r);
      return {rank:3e8+grp[0].r*1e4+ks[0]*100+(ks[1]||0), desc:'Three of a Kind, '+pluralRank(grp[0].r)};
    }
    if (grp[0].c===2&&grp[1]&&grp[1].c===2) {
      var k3=grp[2]?grp[2].r:0;
      return {rank:2e8+grp[0].r*1e4+grp[1].r*100+k3, desc:'Two Pair, '+pluralRank(grp[0].r)+' and '+pluralRank(grp[1].r)};
    }
    if (grp[0].c===2) {
      var ks2=grp.slice(1).map(g=>g.r);
      return {rank:1e8+grp[0].r*1e6+ks2[0]*1e4+(ks2[1]||0)*100+(ks2[2]||0), desc:'Pair of '+pluralRank(grp[0].r)};
    }
    var hv=rv.reduce((a,r,i)=>a+r*Math.pow(15,4-i),0);
    return {rank:hv, desc:'High Card '+rname(rv[0])};
  }

  function rname(v) {
    return {14:'Ace',13:'King',12:'Queen',11:'Jack',10:'Ten',9:'Nine',8:'Eight',
            7:'Seven',6:'Six',5:'Five',4:'Four',3:'Three',2:'Two'}[v]||v;
  }
  function pluralRank(v) {
    // e.g. "Sixes" not "Sixs"
    var n=rname(v);
    if (n==='Six') return 'Sixes';
    if (n==='Two') return 'Twos';
    if (n==='Ace'||n==='Nine'||n==='Five'||n==='Three') return n+'s';
    return n+'s';
  }

  // ---- DOM helpers ----
  function $(id) { return document.getElementById(id); }
  function fmt(bb) {
    if (bb===Math.round(bb)) return bb+'bb';
    var s = bb.toFixed(1);
    return (s.endsWith('.0') ? bb+'bb' : s+'bb');
  }
  function setMsg(txt) { $('msg-banner').textContent = txt; }
  function addLog(txt, hi) {
    var el=$('log');
    var d=document.createElement('div');
    d.className='log-line'+(hi?' hi':'');
    d.textContent=txt;
    el.appendChild(d);
    el.scrollTop=el.scrollHeight;
  }
  function makeCard(card, faceDown) {
    var d=document.createElement('div');
    d.className='card';
    if (faceDown) { d.classList.add('down'); }
    else { d.classList.add(cColor(card)); d.textContent=cDisp(card); }
    return d;
  }

  // ---- Init ----
  function startGame() {
    var cfg = {
      startStack: parseFloat($('cfg-stack').value)||100,
      timeLimit:  parseInt($('cfg-time').value)||20,
      names: [$('cfg-p1').value||'Player 1', $('cfg-p2').value||'Player 2']
    };
    $('setup-screen').style.display='none';
    $('game-screen').style.display='flex';
    newMatch(cfg);
  }

  function newMatch(cfg) {
    G = {
      cfg: cfg,
      handNum: 1,
      stacks: [cfg.startStack, cfg.startStack],
      dealer: Math.random()<0.5?0:1,  // dealer = SB in HU
      // per-hand
      deck: [],
      hole: [null,null],       // [card1,card2] per player
      board: [],               // community cards
      pot: 0,
      bets: [0,0],
      street: 'preflop',
      actPid: -1,
      // ranges[pid][r][c] = map of comboKey → action
      ranges: [null,null],
      narrowed: [null,null],   // Set of comboKeys still in range after action
      // bet tracking
      curBetTo: 0,
      lastRaiseAmt: 0,
      // street tracking
      streetChecked: [false,false],
      streetActed:   [false,false],
      // misc
      draft: [null,null],
      draftBetSz: [null,null],
      timerInt: null,
      timerLeft: cfg.timeLimit,
      handOver: false,
      allIn: false,
      pendingAction: null,
    };
    updateUI();
    dealHand();
  }

  function openSettings() {
    if (!G) return;
    var s=prompt('Starting stack (bb) — takes effect next match:', G.cfg.startStack);
    if (s) G.cfg.startStack=parseFloat(s)||G.cfg.startStack;
    var t=prompt('Time per turn (sec):', G.cfg.timeLimit);
    if (t) G.cfg.timeLimit=parseInt(t)||G.cfg.timeLimit;
  }

  // ---- UI update ----
  function updateUI() {
    if (!G) return;
    // Stacks
    $('tb-hand').textContent='Hand #'+G.handNum;
    // Names & positions
    for (var p=0;p<2;p++) {
      $('pname'+p).textContent=G.cfg.names[p];
      $('dbtn'+p).className='dealer-btn'+(G.dealer===p?' show':'');
      $('pos'+p).textContent=G.dealer===p?'BTN/SB':'BB';
    }
    // Pot
    $('pot-disp').textContent='Pot: '+fmt(G.pot);
    // Bets & stacks
    $('bdisp0').textContent=G.bets[0]>0?fmt(G.bets[0]):'';
    $('bdisp1').textContent=G.bets[1]>0?fmt(G.bets[1]):'';
    $('sdisp0').textContent=fmt(G.stacks[0]);
    $('sdisp1').textContent=fmt(G.stacks[1]);
  }

  // ---- Deal ----
  function dealHand() {
    G.deck = shuffle(buildDeck());
    G.hole[0] = [G.deck.pop(), G.deck.pop()];
    G.hole[1] = [G.deck.pop(), G.deck.pop()];
    G.board = [];
    renderHole(0, debugMode);
    renderHole(1, debugMode);
    renderBoard();
    $('log').innerHTML='';
    updateUI();
    // Post blinds then start
    postBlinds();
    // Initialize both ranges now so the waiting player shows 1326 combos immediately
    G.narrowed=[null,null];
    initRange(0); initRange(1);
    startStreet('preflop');
  }

  function renderHole(pid, reveal) {
    var el=$('hc'+pid);
    el.innerHTML='';
    if (!G.hole[pid]) { el.appendChild(makeCard('',true)); el.appendChild(makeCard('',true)); return; }
    for (var c of G.hole[pid]) el.appendChild(makeCard(c, !reveal));
  }

  function renderBoard() {
    for (var i=0;i<5;i++) {
      var slot=$('cc'+i);
      slot.innerHTML='';
      if (G.board[i]) slot.appendChild(makeCard(G.board[i],false));
    }
  }

  // ---- Blinds ----
  function postBlinds() {
    var sb=G.dealer, bb=1-G.dealer;
    var sbAmt=Math.min(0.5, G.stacks[sb]);
    var bbAmt=Math.min(1,   G.stacks[bb]);
    G.stacks[sb]-=sbAmt; G.bets[sb]=sbAmt;
    G.stacks[bb]-=bbAmt; G.bets[bb]=bbAmt;
    G.curBetTo=bbAmt;
    G.lastRaiseAmt=bbAmt;
    G.pot=0;
    addLog(G.cfg.names[sb]+' posts SB '+fmt(sbAmt)+', '+G.cfg.names[bb]+' posts BB '+fmt(bbAmt));
    updateUI();
  }

  // ---- Streets ----
  function startStreet(street) {
    G.street=street;
    G.streetChecked=[false,false];
    G.streetActed=[false,false];

    // Who acts first
    var first = street==='preflop' ? G.dealer : (1-G.dealer); // SB first preflop, BB first postflop
    startTurn(first);
  }

  function collectBets() {
    G.pot+=G.bets[0]+G.bets[1];
    G.bets=[0,0];
    G.curBetTo=0;
    G.lastRaiseAmt=0;
    updateUI();
  }

  function advanceStreet() {
    var order=['preflop','flop','turn','river'];
    var idx=order.indexOf(G.street);
    collectBets();
    if (idx>=3) { showdown(); return; }
    var next=order[idx+1];
    if (next==='flop')  { G.board.push(G.deck.pop(),G.deck.pop(),G.deck.pop()); }
    else                { G.board.push(G.deck.pop()); }
    renderBoard();
    startStreet(next);
  }

  // ---- Turn ----
  function startTurn(pid) {
    G.actPid=pid;
    suitFilter.suited=new Set(SUITED_SUITS);
    suitFilter.offsuit=new Set(OFFSUIT_SUITS);
    suitFilter.pair=new Set(PAIR_SUITS);
    refreshSuitFilterBtns();
    // Init range
    initRange(pid);
    G.draft[pid]=null;
    G.draftBetSz[pid]=null;
    $('bet-inp').value='';

    colorChart(pid, true);
    colorChart(1-pid, false);
    updateRangeSum(pid);
    updateRangeSum(1-pid);
    updateRangeDist(pid);
    updateSlotsDisabled();
    renderChartListeners(pid);

    $('wait'+pid).textContent='';
    $('wait'+(1-pid)).textContent='Waiting...';

    showActionPanel(pid);
    setMsg(G.cfg.names[pid]+': assign hand ranges, then submit');

    startTimer(pid, function(){ submit(true); });
  }

  // ---- Range Init ----
  function initRange(pid) {
    var facing = isFacing(pid);
    var defAction = facing ? 'fold' : 'check';
    // Only exclude board cards (public info). Opponent hole cards are hidden
    // so excluding them would leak info and reduce count from 1326 to 1225.
    var excluded = [...G.board];
    G.ranges[pid] = [];
    for (var r=0;r<13;r++) {
      G.ranges[pid][r]=[];
      for (var c=0;c<13;c++) {
        var ht=cellHT(r,c);
        var combos=combosFor(ht);
        var map={};
        for (var combo of combos) {
          var c1=combo.slice(0,2), c2=combo.slice(2,4);
          if (excluded.includes(c1)||excluded.includes(c2)) continue;
          var ck=cKey(c1,c2);
          // If the player's range has been narrowed (they already acted this hand),
          // only include combos still in their range. All others are grayed out.
          if (G.narrowed[pid]!==null && !G.narrowed[pid].has(ck)) continue;
          map[ck]=defAction;
        }
        G.ranges[pid][r][c]=map;
      }
    }
  }

  function isFacing(pid) {
    return (G.curBetTo - G.bets[pid]) > 0;
  }

  // ---- Chart rendering ----
  function colorChart(pid, isActive) {
    var chart=$('chart'+pid);
    chart.querySelectorAll('.hc').forEach(function(cell) {
      var r=+cell.dataset.r, c=+cell.dataset.c;
      var type=cellType(r,c);
      var suits=typeSuits(type);
      var map=G.ranges[pid] ? G.ranges[pid][r][c] : null;
      cell.querySelectorAll('.hc-suit').forEach(function(sr, idx) {
        var suit=suits[idx];
        var ck=map ? htSuitKey(r,c,suit) : null;
        var inRange=map && (ck in map);
        if (!inRange) {
          sr.style.background='#0a0a15';
        } else if (isActive) {
          if (!suitFilter[type].has(suit)) {
            sr.style.background='#1c1c2e'; // toggled off — shown as dim gray
          } else {
            sr.style.background=actionColor(map[ck]);
          }
        } else {
          var inNarrowed=G.narrowed[pid]===null || G.narrowed[pid].has(ck);
          sr.style.background=inNarrowed ? '#7d6608' : '#0a0a15';
        }
      });
    });
  }

  function updateRangeSum(pid) {
    var el=$('rsum'+pid);
    if (G.narrowed[pid]!==null) {
      el.textContent=G.narrowed[pid].size+' combos in range';
    } else if (G.ranges[pid]) {
      var n=0;
      for(var r=0;r<13;r++) for(var c=0;c<13;c++) {
        var m=G.ranges[pid][r][c];
        n+=Object.keys(m).length;
      }
      el.textContent=n+' combos';
    } else {
      el.textContent='';
    }
  }

  function updateRangeDist(pid) {
    var distEl=$('range-dist');
    var barEl=$('range-dist-bar');
    if (!distEl||!barEl) return;
    var counts={};
    var total=0;
    for (var r=0;r<13;r++) for (var c=0;c<13;c++) {
      var map=G.ranges[pid][r][c];
      for (var ck in map) {
        var a=map[ck];
        counts[a]=(counts[a]||0)+1;
        total++;
      }
    }
    if (total===0) { distEl.textContent=''; barEl.innerHTML=''; return; }
    var order=['fold','check','call','bet','raise'];
    var colors={fold:'#1a5276',check:'#1e8449',call:'#1e8449',bet:'#922b21',raise:'#922b21'};
    var parts=[];
    order.forEach(function(a){
      if (counts[a]) parts.push({a:a,n:counts[a]});
    });
    distEl.textContent=parts.map(function(p){
      return p.a.charAt(0).toUpperCase()+p.a.slice(1)+' '+Math.round(p.n/total*100)+'%';
    }).join(' · ');
    barEl.innerHTML=parts.map(function(p){
      var pct=(p.n/total*100).toFixed(2);
      return '<span style="width:'+pct+'%;background:'+colors[p.a]+'"></span>';
    }).join('');
  }

  // Build chart cells (once per hand)
  function buildChart(pid) {
    var chart=$('chart'+pid);
    chart.innerHTML='';
    for (var r=0;r<13;r++) for (var c=0;c<13;c++) {
      var cell=document.createElement('div');
      cell.className='hc';
      cell.dataset.r=r; cell.dataset.c=c;
      cell.dataset.dragsel='0';
      var lbl=document.createElement('div');
      lbl.className='hc-label';
      lbl.textContent=cellHT(r,c);
      cell.appendChild(lbl);
      var type=cellType(r,c);
      var sg=document.createElement('div');
      sg.className='hc-suits hcs-'+type;
      for (var suit of typeSuits(type)) {
        var sr=document.createElement('div');
        sr.className='hc-suit';
        sr.dataset.suit=suit;
        sg.appendChild(sr);
      }
      cell.appendChild(sg);
      chart.appendChild(cell);
    }
  }

  // ---- Drag selection ----
  var selMode = 'rect'; // 'rect' | 'free'
  var drag = { on:false, startR:-1, startC:-1, pid:-1, cells: new Set(), removing:false, gesture: new Set() };
  var preflopSlots = [
    [null,null,null,null,null],
    [null,null,null,null,null]
  ];

  function deselectAll() {
    drag.cells=new Set();
    refreshDragHighlight();
  }

  function selectAll() {
    var pid=G.actPid;
    for(var r=0;r<13;r++) for(var c=0;c<13;c++){
      var map=G.ranges[pid][r][c];
      var type=cellType(r,c);
      var filter=suitFilter[type];
      for(var suit of typeSuits(type)){
        if(!filter.has(suit)) continue;
        var ck=htSuitKey(r,c,suit);
        if(ck in map){ drag.cells.add(r+','+c); break; }
      }
    }
    refreshDragHighlight();
  }

  function toggleSelectAll() {
    if(drag.cells.size===0) selectAll(); else deselectAll();
  }

  function setSelMode(mode) {
    selMode = mode;
    document.getElementById('mode-rect').classList.toggle('active', mode==='rect');
    document.getElementById('mode-free').classList.toggle('active', mode==='free');
  }

  function renderChartListeners(pid) {
    var chart=$('chart'+pid);
    // Remove old listeners by replacing (clone)
    var newChart=chart.cloneNode(true);
    chart.parentNode.replaceChild(newChart, chart);
    var nc=$('chart'+pid);

    nc.addEventListener('mousedown', function(e) {
      if (G.actPid!==pid) return;
      var cell=e.target.closest('.hc');
      if (!cell) return;
      e.preventDefault();
      var key=cell.dataset.r+','+cell.dataset.c;
      drag.removing = drag.cells.has(key);
      drag.on=true; drag.pid=pid;
      drag.startR=+cell.dataset.r; drag.startC=+cell.dataset.c;
      drag.prevCells=new Set(drag.cells); // snapshot before this drag
      drag.gesture=new Set([key]);
      // Apply first cell immediately
      if (drag.removing) drag.cells.delete(key); else drag.cells.add(key);
      refreshDragHighlight();
    });

    nc.addEventListener('mousemove', function(e) {
      if (!drag.on||drag.pid!==pid) return;
      var cell=e.target.closest('.hc');
      if (!cell) return;
      if (selMode==='free') {
        var key=cell.dataset.r+','+cell.dataset.c;
        drag.gesture.add(key);
        if (drag.removing) drag.cells.delete(key); else drag.cells.add(key);
      } else {
        var cr=+cell.dataset.r, cc=+cell.dataset.c;
        var minR=Math.min(drag.startR,cr), maxR=Math.max(drag.startR,cr);
        var minC=Math.min(drag.startC,cc), maxC=Math.max(drag.startC,cc);
        // Rebuild the rect relative to start, then apply to the accumulated set
        drag.cells=new Set(drag.prevCells||[]);
        for(var rr=minR;rr<=maxR;rr++) for(var cc2=minC;cc2<=maxC;cc2++) {
          var k=rr+','+cc2;
          if (drag.removing) drag.cells.delete(k); else drag.cells.add(k);
        }
      }
      refreshDragHighlight();
    });
  }

  function refreshDragHighlight() {
    var chart=$('chart'+G.actPid);
    if (!chart) return;
    chart.querySelectorAll('.hc').forEach(function(cell){
      var key=cell.dataset.r+','+cell.dataset.c;
      var on=drag.cells.has(key);
      cell.dataset.dragsel=on?'1':'0';
      if (on) cell.classList.add('drag-sel');
      else cell.classList.remove('drag-sel');
    });
    var btn=$('sel-all-btn');
    if(btn){
      if(drag.cells.size===0){ btn.innerHTML='+<br>Select All'; btn.style.color=''; }
      else { btn.innerHTML='✕<br>Deselect All'; btn.style.color='#c0392b'; }
    }
  }

  document.addEventListener('mouseup', function(e) {
    if (!drag.on) return;
    drag.on=false;
    // Selection stays highlighted; click an action button to assign
  });

  // ---- Suit filter ----

  function buildSuitFilterUI() {

  }

  function sfToggle(type, suit, btn) {
    if (suitFilter[type].has(suit)) { suitFilter[type].delete(suit); btn.classList.add('off'); }
    else { suitFilter[type].add(suit); btn.classList.remove('off'); }
    if (G && G.actPid>=0 && !G.handOver) colorChart(G.actPid, true);
  }

  function sfSetAll(type, on) {
    var suits=typeSuits(type);
    for (var suit of suits) {
      if (on) suitFilter[type].add(suit); else suitFilter[type].delete(suit);
      var btn=$('sf-'+type+'-'+suit);
      if (btn) btn.classList.toggle('off',!on);
    }
    if (G && G.actPid>=0 && !G.handOver) colorChart(G.actPid, true);
  }

  function refreshSuitFilterBtns() {
    for(var type of ['suited','offsuit','pair']){
      for(var suit of typeSuits(type)){
        var btn=$('sf-'+type+'-'+suit);
        if(btn) btn.classList.toggle('off',!suitFilter[type].has(suit));
      }
    }
  }

  // Returns {suited,offsuit,pair} Sets of suit combos that produce the given flush category,
  // or null if the category doesn't need a suit-filter override.
  function autoSuitFilter(catId, ba) {
    var sc=ba.suitCounts;
    if(catId==='flush'||catId==='straightflush'){
      var suited=new Set(), offsuit=new Set(), pair=new Set();
      for(var s of SUITED_SUITS){
        if((sc[s[0]]||0)+2>=5) suited.add(s);
      }
      for(var s of OFFSUIT_SUITS){
        if((sc[s[0]]||0)+1>=5||(sc[s[1]]||0)+1>=5) offsuit.add(s);
      }
      for(var s of PAIR_SUITS){
        if((sc[s[0]]||0)+1>=5||(sc[s[1]]||0)+1>=5) pair.add(s);
      }
      return {suited:suited,offsuit:offsuit,pair:pair};
    }
    if(catId==='flushdraw'){
      var suited=new Set(), offsuit=new Set(), pair=new Set();
      for(var s of SUITED_SUITS){
        if((sc[s[0]]||0)+2===4) suited.add(s);
      }
      for(var s of OFFSUIT_SUITS){
        if((sc[s[0]]||0)+1===4||(sc[s[1]]||0)+1===4) offsuit.add(s);
      }
      for(var s of PAIR_SUITS){
        if((sc[s[0]]||0)+1===4||(sc[s[1]]||0)+1===4) pair.add(s);
      }
      return {suited:suited,offsuit:offsuit,pair:pair};
    }
    return null;
  }

  // ---- Hand type category selection ----

  function boardAnalysis(board) {
    var rc={}, sc={s:0,h:0,d:0,c:0};
    for(var card of board){ var rk=cRank(card), sk=cSuit(card); rc[rk]=(rc[rk]||0)+1; sc[sk]++; }
    var ur=Object.keys(rc).sort(function(a,b){return RVAL[b]-RVAL[a];});
    return {rankCounts:rc, suitCounts:sc, uniqueRanks:ur,
            isPaired:Object.values(rc).some(function(c){return c>=2;}),
            topRankVal:ur.length>0?RVAL[ur[0]]:0};
  }

  function hasStraightRanks(rvArr) {
    var s=new Set(rvArr);
    if(s.has(14)) s.add(1);
    for(var lo=1;lo<=10;lo++)
      if([lo,lo+1,lo+2,lo+3,lo+4].every(function(r){return s.has(r);})) return true;
    return false;
  }

  function isStraightPossible(ba) {
    var s=new Set(ba.uniqueRanks.map(function(r){return RVAL[r];}));
    if(s.has(14)) s.add(1);
    for(var lo=1;lo<=10;lo++)
      if([lo,lo+1,lo+2,lo+3,lo+4].filter(function(r){return s.has(r);}).length>=3) return true;
    return false;
  }

  function isDrawPossible(ba) {
    var s=new Set(ba.uniqueRanks.map(function(r){return RVAL[r];}));
    if(s.has(14)) s.add(1);
    for(var lo=1;lo<=10;lo++)
      if([lo,lo+1,lo+2,lo+3,lo+4].filter(function(r){return s.has(r);}).length>=2) return true;
    return false;
  }

  function isFlushHand(c1,c2,ba) {
    var sc=Object.assign({},ba.suitCounts);
    sc[cSuit(c1)]++; sc[cSuit(c2)]++;
    return Object.values(sc).some(function(c){return c>=5;});
  }

  function isStraightHand(c1,c2,board) {
    return hasStraightRanks([c1,c2].concat(board).map(function(c){return RVAL[cRank(c)];}));
  }

  function isPairAtRank(c1,c2,rank,ba) {
    if(!rank||ba.rankCounts[rank]!==1) return false;
    var r1=cRank(c1),r2=cRank(c2);
    if(r1===r2) return false;
    if((r1===rank)===(r2===rank)) return false; // neither or both hit rank
    var other=(r1===rank)?r2:r1;
    return !ba.rankCounts[other];
  }

  function isOverpair(c1,c2,ba) {
    var r1=cRank(c1),r2=cRank(c2);
    if(r1!==r2||ba.rankCounts[r1]) return false;
    return RVAL[r1]>ba.topRankVal;
  }

  function isUnderpair(c1,c2,ba) {
    var r1=cRank(c1),r2=cRank(c2);
    if(r1!==r2||ba.rankCounts[r1]) return false;
    return RVAL[r1]<ba.topRankVal;
  }

  function isFlushDraw(c1,c2,ba) {
    var sc=Object.assign({},ba.suitCounts);
    sc[cSuit(c1)]++; sc[cSuit(c2)]++;
    return Object.values(sc).some(function(c){return c===4;});
  }

  function getStraightDrawType(c1,c2,board) {
    var allRV=[c1,c2].concat(board).map(function(c){return RVAL[cRank(c)];});
    if(hasStraightRanks(allRV)) return null;
    var s=new Set(allRV);
    if(s.has(14)) s.add(1);
    var oesd=false,gutshot=false;
    for(var lo=1;lo<=10;lo++){
      var win=[lo,lo+1,lo+2,lo+3,lo+4];
      if(win.filter(function(r){return s.has(r);}).length===4){
        var mi=win.findIndex(function(r){return !s.has(r);});
        if((mi===0&&lo+4<14)||(mi===4&&lo>1)) oesd=true; else gutshot=true;
      }
    }
    return {oesd:oesd,gutshot:gutshot};
  }

  function isTwoPair(c1,c2,ba) {
    if(ba.isPaired) return false;
    var r1=cRank(c1),r2=cRank(c2);
    if(r1===r2) return false;
    return !!(ba.rankCounts[r1]&&ba.rankCounts[r2]);
  }

  function isSet(c1,c2,ba) {
    if(ba.isPaired) return false;
    var r1=cRank(c1),r2=cRank(c2);
    if(r1!==r2) return false;
    return !!ba.rankCounts[r1];
  }

  function handTier(c1,c2,board) {
    var h=evalHand([c1,c2].concat(board)).rank;
    if(h>=8e8) return 8;
    if(h>=7e8) return 7; // quads
    if(h>=6e8) return 6; // full house
    if(h>=5e8) return 5; // flush
    if(h>=4e8) return 4; // straight
    if(h>=3e8) return 3; // trips
    if(h>=2e8) return 2;
    if(h>=1e8) return 1;
    return 0;
  }

  function matchesCategory(c1,c2,catId,ba,board) {
    switch(catId){
      case 'flush':        return isFlushHand(c1,c2,ba);
      case 'straightflush':return handTier(c1,c2,board)===8;
      case 'straight':     return isStraightHand(c1,c2,board);
      case 'pair0':     return isPairAtRank(c1,c2,ba.uniqueRanks[0],ba);
      case 'pair1':     return isPairAtRank(c1,c2,ba.uniqueRanks[1],ba);
      case 'pair2':     return isPairAtRank(c1,c2,ba.uniqueRanks[2],ba);
      case 'pair3':     return isPairAtRank(c1,c2,ba.uniqueRanks[3],ba);
      case 'pair4':     return isPairAtRank(c1,c2,ba.uniqueRanks[4],ba);
      case 'overpair':  return isOverpair(c1,c2,ba);
      case 'underpair': return isUnderpair(c1,c2,ba);
      case 'flushdraw': return isFlushDraw(c1,c2,ba);
      case 'oesd':      { var dt=getStraightDrawType(c1,c2,board); return !!(dt&&dt.oesd); }
      case 'gutshot':   { var dt2=getStraightDrawType(c1,c2,board); return !!(dt2&&dt2.gutshot); }
      case 'twopair':   return isTwoPair(c1,c2,ba);
      case 'set':       return isSet(c1,c2,ba);
      case 'trips':     return handTier(c1,c2,board)===3;
      case 'fullhouse': return handTier(c1,c2,board)===6;
      case 'quads':     return handTier(c1,c2,board)===7;
      default: return false;
    }
  }

  function getHandCategories(pid, board) {
    if(!board||board.length===0) return [];
    var ba=boardAnalysis(board);
    var isRiver=board.length===5;

    var counts={flush:0,straightflush:0,straight:0,p0:0,p1:0,p2:0,p3:0,p4:0,
                overpair:0,underpair:0,flushdraw:0,oesd:0,gutshot:0,
                twopair:0,set:0,trips:0,fullhouse:0,quads:0};

    var validPairIdxs=ba.uniqueRanks.map(function(r,i){return {r:r,i:i};})
                        .filter(function(x){return ba.rankCounts[x.r]===1&&x.i<5;});
    var checkFlush=Object.values(ba.suitCounts).some(function(c){return c>=3;});
    var checkSt=isStraightPossible(ba);
    var checkFD=!isRiver&&Object.values(ba.suitCounts).some(function(c){return c>=2;});
    var checkDr=!isRiver&&isDrawPossible(ba);

    for(var row=0;row<13;row++) for(var col=0;col<13;col++){
      var map=G.ranges[pid][row][col];
      var type=cellType(row,col);
      for(var suit of typeSuits(type)){
        var ck=htSuitKey(row,col,suit);
        if(!(ck in map)) continue;
        var c1=ck.slice(0,2),c2=ck.slice(2,4);
        if(checkFlush&&isFlushHand(c1,c2,ba)) counts.flush++;
        if(checkFlush&&checkSt&&handTier(c1,c2,board)===8) counts.straightflush++;
        if(checkSt&&isStraightHand(c1,c2,board)) counts.straight++;
        for(var pp of validPairIdxs) if(isPairAtRank(c1,c2,pp.r,ba)) counts['p'+pp.i]++;
        if(ba.topRankVal<14&&isOverpair(c1,c2,ba)) counts.overpair++;
        if(ba.uniqueRanks.length>0&&isUnderpair(c1,c2,ba)) counts.underpair++;
        if(checkFD&&isFlushDraw(c1,c2,ba)) counts.flushdraw++;
        if(checkDr){var dt=getStraightDrawType(c1,c2,board);if(dt){if(dt.oesd)counts.oesd++;if(dt.gutshot)counts.gutshot++;}}
        if(!ba.isPaired){if(isTwoPair(c1,c2,ba))counts.twopair++;if(isSet(c1,c2,ba))counts.set++;}
        if(ba.isPaired){var t=handTier(c1,c2,board);if(t===3)counts.trips++;else if(t===6)counts.fullhouse++;else if(t===7)counts.quads++;}
      }
    }

    var cats=[];
    var pnames=['Top Pair','2nd Pair','3rd Pair','4th Pair','5th Pair'];
    if(counts.straightflush>0) cats.push({id:'straightflush',label:'Str. Flush',n:counts.straightflush});
    if(ba.isPaired&&counts.quads>0) cats.push({id:'quads',label:'Quads',n:counts.quads});
    if(ba.isPaired&&counts.fullhouse>0) cats.push({id:'fullhouse',label:'Full House',n:counts.fullhouse});
    if(counts.flush>0) cats.push({id:'flush',label:'Flush',n:counts.flush});
    if(counts.straight>0) cats.push({id:'straight',label:'Straight',n:counts.straight});
    if(ba.isPaired&&counts.trips>0) cats.push({id:'trips',label:'Trips',n:counts.trips});
    if(!ba.isPaired&&counts.set>0) cats.push({id:'set',label:'Set',n:counts.set});
    if(!ba.isPaired&&counts.twopair>0) cats.push({id:'twopair',label:'Two Pair',n:counts.twopair});
    if(counts.overpair>0) cats.push({id:'overpair',label:'Overpair',n:counts.overpair});
    validPairIdxs.forEach(function(pp){if(counts['p'+pp.i]>0)cats.push({id:'pair'+pp.i,label:pnames[pp.i],n:counts['p'+pp.i]});});
    if(counts.underpair>0) cats.push({id:'underpair',label:'Underpair',n:counts.underpair});
    if(!isRiver&&counts.flushdraw>0) cats.push({id:'flushdraw',label:'Flush Draw',n:counts.flushdraw});
    if(!isRiver&&counts.oesd>0) cats.push({id:'oesd',label:'OESD',n:counts.oesd});
    if(!isRiver&&counts.gutshot>0) cats.push({id:'gutshot',label:'Gutshot',n:counts.gutshot});
    return cats;
  }

  function selectCategory(catId, ba, board) {
    var pid=G.actPid;
    var asf=autoSuitFilter(catId,ba);
    if(asf){
      suitFilter.suited=asf.suited;
      suitFilter.offsuit=asf.offsuit;
      suitFilter.pair=asf.pair;
      refreshSuitFilterBtns();
      colorChart(pid,true);
    }
    for(var r=0;r<13;r++) for(var c=0;c<13;c++){
      var map=G.ranges[pid][r][c];
      var type=cellType(r,c);
      var filter=suitFilter[type];
      var anyMatch=false;
      for(var suit of typeSuits(type)){
        if(!filter.has(suit)) continue;
        var ck=htSuitKey(r,c,suit);
        if(!(ck in map)) continue;
        if(matchesCategory(ck.slice(0,2),ck.slice(2,4),catId,ba,board)){anyMatch=true;break;}
      }
      if(anyMatch) drag.cells.add(r+','+c);
    }
    refreshDragHighlight();
  }

  function toggleHT() {
    var body=$('ht-body');
    var open=body.style.display!=='none';
    body.style.display=open?'none':'flex';
    $('ht-toggle-btn').textContent=(open?'▸':'▾')+' Hand Types';
  }

  function buildHandTypePanel() {
    var body=$('ht-body');
    if(!body||!G) return;
    body.innerHTML='';
    if(!G.board||G.board.length===0){
      body.innerHTML='<span style="font-size:0.63em;color:#555">No categories preflop</span>';
      return;
    }
    var board=G.board;
    var ba=boardAnalysis(board);
    var cats=getHandCategories(G.actPid,board);
    if(cats.length===0){
      body.innerHTML='<span style="font-size:0.63em;color:#555">None available</span>';
      return;
    }
    cats.forEach(function(cat){
      var btn=document.createElement('button');
      btn.className='ht-btn';
      btn.textContent=cat.label+' ('+cat.n+')';
      btn.onclick=function(){ selectCategory(cat.id,ba,board); };
      body.appendChild(btn);
    });
  }

  // ---- Action panel ----

  function showActionPanel(pid) {
    var ap=$('action-panel');
    ap.classList.remove('hidden');
    var abtns=$('abtns');
    abtns.innerHTML='';

    var facing=isFacing(pid);
    var toCall=Math.min(G.curBetTo-G.bets[pid], G.stacks[pid]);

    if (!facing) {
      makeABtn('Check','check','aBtn-check');
    } else {
      makeABtn('Call '+fmt(toCall),'call','aBtn-call');
      makeABtn('Fold','fold','aBtn-fold');
    }
    var facingAllIn = G.stacks[1-pid] === 0 || (facing && toCall >= G.stacks[pid]);
    if (!facingAllIn) {
      if (G.curBetTo===0) makeABtn('Bet','bet','aBtn-bet');
      else makeABtn('Raise','raise','aBtn-raise');
    }

    $('action-prompt').textContent=G.cfg.names[pid]+': select hands then assign action';
    updateBetUI(pid);
    buildHandTypePanel();
  }

  function makeABtn(label, mode, cls) {
    var b=document.createElement('button');
    b.className='aBtn '+cls;
    b.dataset.mode=mode;
    b.textContent=label;
    b.addEventListener('click', function(){
      if (drag.cells.size>0) assignSelection(G.actPid, mode);
    });
    $('abtns').appendChild(b);
  }

  function updateBetUI(pid) {
    var opp = 1 - pid;
    var myStack = G.stacks[pid];
    var myBet = G.bets[pid];
    var callAmt = Math.max(0, G.curBetTo - myBet);
    var facingAllIn = G.stacks[opp] === 0 || (callAmt > 0 && callAmt >= myStack);
    $('bet-row').style.display = facingAllIn ? 'none' : 'flex';
    $('presets').style.display = facingAllIn ? 'none' : 'flex';

    var effectiveMax = Math.min(myBet + myStack, G.bets[opp] + G.stacks[opp]);
    var pot = G.pot + G.bets[0] + G.bets[1] + callAmt;
    var minRaiseTotal = G.curBetTo===0 ? 1 : G.curBetTo + G.lastRaiseAmt;

    var ps=$('presets');
    ps.innerHTML='';
    var sizes=[
      {l:'Min', v:minRaiseTotal},
      {l:'1/3P', v:+(G.curBetTo+pot/3).toFixed(1)},
      {l:'½P',  v:+(G.curBetTo+pot*0.5).toFixed(1)},
      {l:'¾P',  v:+(G.curBetTo+pot*0.75).toFixed(1)},
      {l:'Pot',  v:+(G.curBetTo+pot).toFixed(1)},
      {l:'Allin',v:effectiveMax},
    ];
    sizes.forEach(function(sz){
      var capped=Math.min(sz.v, effectiveMax);
      if (capped<=G.curBetTo&&sz.l!=='Allin'&&sz.l!=='Min') return;
      var b=document.createElement('button');
      b.className='preset';
      b.textContent=sz.l;
      var illegal = sz.l!=='Allin' && sz.l!=='Min' && sz.v < minRaiseTotal;
      if (illegal) {
        b.disabled=true;
      } else {
        b.addEventListener('click',function(){ $('bet-inp').value=capped.toFixed(1); });
      }
      ps.appendChild(b);
    });

    $('bet-inp').min = minRaiseTotal;
    $('bet-inp').max = effectiveMax;

    // Only set default value when first opening the panel (input is empty)
    if (!$('bet-inp').value) {
      var defBet=G.curBetTo===0?Math.max(+(pot*0.5).toFixed(1),1,minRaiseTotal):minRaiseTotal;
      $('bet-inp').value=Math.min(defBet, effectiveMax).toFixed(1);
    }
  }

  function hideActionPanel() {
    $('action-panel').classList.add('hidden');
    drag.cells=new Set();
  }

  // ---- Assign selection ----
  function assignSelection(pid, action) {
    drag.cells.forEach(function(key) {
      var parts=key.split(',');
      var r=+parts[0], c=+parts[1];
      var map=G.ranges[pid][r][c];
      var type=cellType(r,c);
      var filter=suitFilter[type];
      for (var suit of typeSuits(type)) {
        if (!filter.has(suit)) continue;
        var ck=htSuitKey(r,c,suit);
        if (ck in map) map[ck]=action;
      }
    });
    drag.cells=new Set();
    refreshDragHighlight();
    colorChart(pid, true);
    updateRangeSum(pid);
    updateRangeDist(pid);
  }

  // ---- Draft & Submit ----
  function saveDraft() {
    var pid=G.actPid;
    G.draft[pid]=JSON.parse(JSON.stringify(G.ranges[pid]));
    G.draftBetSz[pid]=parseFloat($('bet-inp').value)||null;
    setMsg('Draft saved!');
    setTimeout(function(){ setMsg(G.cfg.names[pid]+': assign hand ranges, then submit'); }, 1200);
  }

  function submit(fromTimer) {
    var pid=G.actPid;
    deselectAll();
    stopTimer();
    var betSz = fromTimer && G.draftBetSz[pid] != null
      ? G.draftBetSz[pid]
      : parseFloat($('bet-inp').value) || 1;
    if (fromTimer&&G.draft[pid]) G.ranges[pid]=G.draft[pid];

    $('wait'+pid).textContent='';
    $('wait'+(1-pid)).textContent='';
    drag.cells=new Set();

    // Find action for actual hole cards
    var [c1,c2]=G.hole[pid];
    var ht=handType(c1,c2);
    var {r,c}=htCell(ht);
    var map=G.ranges[pid][r][c];
    var ck=cKey(c1,c2);
    var action=map[ck]||(isFacing(pid)?'fold':'check');

    // Build narrowed range: all combos that took same action
    var narrowedSet=new Set();
    for(var rr=0;rr<13;rr++) for(var cc=0;cc<13;cc++) {
      var m=G.ranges[pid][rr][cc];
      for(var k in m) {
        if (m[k]===action) narrowedSet.add(k);
      }
    }
    G.narrowed[pid]=narrowedSet;

    colorChart(pid, false);
    updateRangeSum(pid);

    addLog(G.cfg.names[pid]+' ('+G.street+'): '+action+(betSz&&(action==='bet'||action==='raise')?' '+fmt(betSz):''), true);
    setMsg(G.cfg.names[pid]+' → '+action+(action==='bet'||action==='raise'?' '+fmt(betSz):''));

    execAction(pid, action, betSz);
  }

  // ---- Execute action ----
  function execAction(pid, action, betSz) {
    var opp=1-pid;
    G.streetActed[pid]=true;

    if (action==='fold') {
      endHand(opp, 'fold'); return;
    }

    if (action==='check') {
      G.streetChecked[pid]=true;
      checkAdvance(pid); return;
    }

    if (action==='call') {
      var toCall=Math.min(G.curBetTo-G.bets[pid], G.stacks[pid]);
      G.stacks[pid]-=toCall;
      G.bets[pid]+=toCall;
      updateUI();
      // If all-in
      if (G.stacks[pid]===0||G.stacks[opp]===0) {
        G.allIn=true;
        collectBets();
        runOutBoard(); return;
      }
      // Preflop: if SB calls BB's blind (limp), BB still gets option
      // Detect: preflop, caller is SB(=dealer), and the bet was only 1bb (no prior raise)
      if (G.street==='preflop' && pid===G.dealer && G.lastRaiseAmt<=1 && !G.streetActed[opp]) {
        // BB gets the option
        setTimeout(function(){ startTurn(opp); }, 300);
        return;
      }
      advanceStreet(); return;
    }

    if (action==='bet'||action==='raise') {
      var myBet=G.bets[pid];
      var myStack=G.stacks[pid];
      var effectiveMax=Math.min(myBet+myStack, G.bets[1-pid]+G.stacks[1-pid]);
      var minTotal = G.curBetTo===0 ? Math.max(1, betSz) : G.curBetTo + G.lastRaiseAmt;
      var totalBet=Math.min(betSz, effectiveMax);
      totalBet=Math.max(totalBet, Math.min(minTotal, effectiveMax));
      var extra=totalBet-myBet;
      var paid=Math.min(extra, myStack);
      G.stacks[pid]-=paid;
      G.bets[pid]+=paid;
      var raiseAmt=G.bets[pid]-G.curBetTo;
      G.lastRaiseAmt=Math.max(raiseAmt, G.lastRaiseAmt);
      G.curBetTo=G.bets[pid];
      updateUI();

      if (G.stacks[pid]===0) G.allIn=true;

      // Opponent must act (preserve narrowed ranges from this street)
      setTimeout(function(){ startTurn(opp); }, 300);
      return;
    }
  }

  function checkAdvance(pid) {
    var opp=1-pid;
    if (G.street==='preflop') {
      // Preflop HU: SB(=dealer) acts first. After SB acts, BB acts. If BB checks, done.
      if (pid===G.dealer) {
        // SB just checked (limped) — BB gets option
        setTimeout(function(){ startTurn(opp); }, 300);
      } else {
        // BB checked their option
        advanceStreet();
      }
    } else {
      // Postflop: BB acts first (pid=1-dealer). If first actor checked, second actor gets chance.
      // If both checked, advance.
      if (G.streetChecked[opp]) {
        // Both checked
        advanceStreet();
      } else {
        setTimeout(function(){ startTurn(opp); }, 300);
      }
    }
  }

  // ---- All-in runout ----
  function runOutBoard() {
    while(G.board.length<3) G.board.push(G.deck.pop());
    if(G.board.length<4) G.board.push(G.deck.pop());
    if(G.board.length<5) G.board.push(G.deck.pop());
    renderBoard();
    renderHole(0,true); renderHole(1,true);
    setTimeout(function(){ showdown(); }, 800);
  }

  // ---- Showdown ----
  function showdown() {
    renderHole(0,true); renderHole(1,true);
    var board=G.board;
    var h0=evalHand([...G.hole[0],...board]);
    var h1=evalHand([...G.hole[1],...board]);
    var pot=G.pot;
    var winner=-1, title='Split Pot!';
    if (h0.rank>h1.rank) { winner=0; title=G.cfg.names[0]+' Wins!'; G.stacks[0]+=pot; }
    else if (h1.rank>h0.rank) { winner=1; title=G.cfg.names[1]+' Wins!'; G.stacks[1]+=pot; }
    else { G.stacks[0]+=pot/2; G.stacks[1]+=pot/2; }
    G.pot=0; G.handOver=true;
    updateUI();
    addLog('SHOWDOWN: '+G.cfg.names[0]+': '+h0.desc+' | '+G.cfg.names[1]+': '+h1.desc+' → '+title, true);

    // Show overlay
    $('sd-title').textContent=title;
    $('sd-h0').textContent=G.cfg.names[0]+': '+h0.desc;
    $('sd-h1').textContent=G.cfg.names[1]+': '+h1.desc;
    // Cards
    var c0=$('sd-c0'); c0.innerHTML='';
    var c1=$('sd-c1'); c1.innerHTML='';
    G.hole[0].forEach(function(c){ c0.appendChild(makeCard(c,false)); });
    G.hole[1].forEach(function(c){ c1.appendChild(makeCard(c,false)); });
    $('sd-pot').textContent=winner>=0?G.cfg.names[winner]+' wins '+fmt(pot):'Split '+fmt(pot);
    $('showdown-overlay').classList.add('show');
  }

  function closeShowdown() {
    $('showdown-overlay').classList.remove('show');
    if (G.stacks[0]<=0||G.stacks[1]<=0) {
      var wi=G.stacks[0]>0?0:1;
      setMsg(G.cfg.names[wi]+' wins the match!');
      $('next-btn').textContent='Play Again';
      $('next-btn').onclick=function(){ newMatch(G.cfg); };
      $('next-btn').style.display='block';
    } else {
      $('next-btn').textContent='Next Hand';
      $('next-btn').onclick=nextHand;
      $('next-btn').style.display='block';
    }
  }

  // ---- End hand (fold) ----
  function endHand(winnerPid, reason) {
    stopTimer();
    hideActionPanel();
    var pot=G.pot+G.bets[0]+G.bets[1];
    G.stacks[winnerPid]+=pot;
    G.pot=0; G.bets=[0,0];
    G.handOver=true;
    updateUI();
    renderHole(0,true); renderHole(1,true);
    addLog(G.cfg.names[winnerPid]+' wins '+fmt(pot)+' (opponent folded)', true);
    setMsg(G.cfg.names[winnerPid]+' wins the pot — opponent folded');
    $('next-btn').textContent=G.stacks[0]>0&&G.stacks[1]>0?'Next Hand':'Play Again';
    $('next-btn').onclick=G.stacks[0]>0&&G.stacks[1]>0?nextHand:function(){ newMatch(G.cfg); };
    $('next-btn').style.display='block';
  }

  // ---- Next hand ----
  function nextHand() {
    $('next-btn').style.display='none';
    G.handNum++;
    G.dealer=1-G.dealer;
    G.narrowed=[null,null];
    G.handOver=false; G.allIn=false;
    G.bets=[0,0]; G.pot=0;
    G.curBetTo=0; G.lastRaiseAmt=0;
    buildChart(0); buildChart(1);
    colorChart(0,false); colorChart(1,false);
    $('rsum0').textContent=''; $('rsum1').textContent='';
    $('wait0').textContent=''; $('wait1').textContent='';
    updateUI();
    dealHand();
  }

  // ---- Debug mode ----
  var debugMode = false;
  function toggleDebug() {
    debugMode = !debugMode;
    var btn = $('debug-btn');
    if (debugMode) {
      btn.textContent = '🔍 Debug: On';
      btn.style.color = '#f0c040';
      btn.style.borderColor = '#f0c040';
    } else {
      btn.textContent = '🔍 Debug: Off';
      btn.style.color = '#555';
      btn.style.borderColor = '#1a5276';
    }
    if (G && G.hole[0]) { renderHole(0, debugMode); renderHole(1, debugMode); }
  }

  // ---- Timer ----
  function startTimer(pid, onDone) {
    stopTimer();
    G.timerLeft=G.cfg.timeLimit;
    var fill=$('tfill'+pid);
    var text=$('ttext'+pid);
    var row=$('timer'+pid);
    row.classList.add('active');
    fill.style.transition='none';
    fill.style.width='100%';

    G.timerInt=setInterval(function(){
      G.timerLeft--;
      var pct=Math.max(0, G.timerLeft/G.cfg.timeLimit*100);
      fill.style.transition='width 1s linear';
      fill.style.width=pct+'%';
      text.textContent=G.timerLeft+'s';
      if (G.timerLeft<=0) { stopTimer(); onDone(); }
    }, 1000);
  }

  function stopTimer() {
    if (G&&G.timerInt) { clearInterval(G.timerInt); G.timerInt=null; }
    for(var i=0;i<2;i++) $('timer'+i).classList.remove('active');
  }

  // ---- Init charts on load ----
  function initCharts() {
    buildChart(0);
    buildChart(1);
  }

  // ---- Public API ----
  // ---- Preflop range slots ----
  function buildRangeSlots() {
    for (var pid = 0; pid < 2; pid++) {
      var el = $('rs'+pid);
      if (!el) continue;
      var html = '<div class="rs-hdr">Preflop<br>Ranges</div>';
      for (var i = 0; i < 5; i++) {
        html += '<div class="rs-slot">' +
          '<div class="rs-name" id="rsn-'+pid+'-'+i+'" contenteditable="true" spellcheck="false">Slot '+(i+1)+'</div>' +
          '<button class="rs-btn rs-save" onclick="RP.saveRange('+pid+','+i+')">Save</button>' +
          '<button class="rs-btn rs-load" onclick="RP.loadRange('+pid+','+i+')">Load</button>' +
          '</div>';
      }
      el.innerHTML = html;
    }
  }

  function updateSlotsDisabled() {
    var isPreflop = G && G.street === 'preflop';
    for (var pid = 0; pid < 2; pid++) {
      var el = $('rs'+pid);
      if (el) el.classList.toggle('pf-disabled', !isPreflop || G.actPid !== pid);
    }
  }

  function saveRange(pid, i) {
    if (!G || G.street !== 'preflop') return;
    preflopSlots[pid][i] = {
      ranges: JSON.parse(JSON.stringify(G.ranges[pid])),
      betSz: parseFloat($('bet-inp').value) || null
    };
    var loadBtn = document.querySelector('#rs'+pid+' .rs-slot:nth-child('+(i+2)+') .rs-load');
    if (loadBtn) loadBtn.classList.add('has-data');
    setMsg('Range saved to slot '+(i+1)+'.');
  }

  function remapAction(action, facing) {
    if (facing) {
      if (action === 'check') return 'fold';
      if (action === 'bet') return 'raise';
      return action;
    } else {
      if (action === 'fold' || action === 'call') return 'check';
      if (action === 'raise') return 'bet';
      return action;
    }
  }

  function loadRange(pid, i) {
    if (!G || G.street !== 'preflop') return;
    var slot = preflopSlots[pid][i];
    if (!slot) { setMsg('Slot '+(i+1)+' is empty.'); return; }
    var facing = isFacing(pid);
    var defAction = facing ? 'fold' : 'check';
    var savedRanges = slot.ranges;
    for (var r = 0; r < 13; r++) {
      for (var c = 0; c < 13; c++) {
        var curMap = G.ranges[pid][r][c];
        var savedMap = savedRanges[r] && savedRanges[r][c];
        for (var ck in curMap) {
          if (savedMap && (ck in savedMap)) {
            curMap[ck] = remapAction(savedMap[ck], facing);
          } else {
            curMap[ck] = defAction;
          }
        }
      }
    }
    if (slot.betSz) {
      var minRaiseTotal = G.curBetTo === 0 ? 1 : G.curBetTo + G.lastRaiseAmt;
      $('bet-inp').value = Math.max(slot.betSz, minRaiseTotal).toFixed(1);
    }
    colorChart(pid, true);
    updateRangeSum(pid);
    updateRangeDist(pid);
    setMsg('Slot '+(i+1)+' loaded.');
  }

  return {
    startGame: startGame,
    openSettings: openSettings,
    saveDraft: saveDraft,
    submit: function(){ submit(false); },
    nextHand: nextHand,
    closeShowdown: closeShowdown,
    toggleDebug: toggleDebug,
    toggleSF: toggleSF,
    toggleHT: toggleHT,
    deselectAll: deselectAll,
    toggleSelectAll: toggleSelectAll,
    setSelMode: setSelMode,
    _initCharts: initCharts,
    _buildSuitFilter: buildSuitFilterUI,
    _buildRangeSlots: buildRangeSlots,
    saveRange: saveRange,
    loadRange: loadRange
  };
})();

// Init charts on page load
document.addEventListener('DOMContentLoaded', function(){
  RP._initCharts();
  RP._buildSuitFilter();
  RP._buildRangeSlots();
  var betInp = document.getElementById('bet-inp');
  betInp.addEventListener('change', function() {
    var val = parseFloat(this.value);
    var min = parseFloat(this.min);
    var max = parseFloat(this.max);
    if (min && val < min) this.value = min.toFixed(1);
    else if (max && val > max) this.value = max.toFixed(1);
  });
});
</script>
